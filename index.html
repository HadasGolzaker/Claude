      <label class="no-li-toggle"><input type="checkbox" id="no-li" ${noLi?'checked':''}> ${t.no_li}</label>

      <label class="field-label">${postsLabel} <small>· ${postsSmall}</small></label>
      <textarea id="posts-ta" placeholder="${postsPh}">${uploads.posts}</textarea>

      <label class="field-label">${t.pic_label} <small>· ${t.pic_small}</small></label>
      <label class="upload-box"><input type="file" id="img-input" accept="image/png,image/jpeg,image/webp" multiple>
        ${t.pic_btn}</label>
      <div class="thumbs" id="thumbs">${uploads.images.map(im=>`<img src="data:${im.media_type};base64,${im.data}">`).join('')}</div>

      <label class="field-label">${aboutLabel} <small>· ${aboutSmall}</small></label>
      <textarea id="about-ta" style="min-height:90px" placeholder="${aboutPh}">${uploads.about}</textarea>`;
  }

  const isLast = step===QUESTIONS.length-1;
  return `<div class="step active">
    <div class="eyebrow">${L.ey}</div>
    <h2 class="q-title">${L.t}</h2>
    ${L.s?`<p class="q-sub">${L.s}</p>`:''}
    ${body}
    <div class="nav">
      <button class="btn btn-ghost" onclick="goStep(-1)">${t.back}</button>
      <span class="progress-label">${step+1} ${t.of} ${QUESTIONS.length}</span>
      <button class="btn btn-primary" id="next-btn" ${answered(q.id)?'':'disabled'}
        onclick="goStep(1)">${isLast?t.generate:t.next}</button>
    </div>
  </div>`;
}
function goStep(delta){ step+=delta; saveDraft(); render(); }

function wireQuestion(q){
  if(q.type==='open'){
    const ta=document.getElementById('ta');
    ta.addEventListener('input',()=>{answers[q.id]=ta.value;refreshNext(q);renderLayers();scheduleDraftSave();});
  }
  if(q.type==='single'){
    document.querySelectorAll('.opt').forEach(b=>b.addEventListener('click',()=>{
      answers[q.id]=b.dataset.v; scheduleDraftSave(); render();
    }));
  }
  if(q.type==='rank'){ wireRank(q); }
  if(q.type==='uploads'){
    const pt=document.getElementById('posts-ta'), ab=document.getElementById('about-ta');
    document.getElementById('no-li').addEventListener('change',e=>{ uploads.noLinkedIn=e.target.checked; scheduleDraftSave(); render(); });
    pt.addEventListener('input',()=>{uploads.posts=pt.value;refreshNext(q);renderLayers();scheduleDraftSave();});
    ab.addEventListener('input',()=>{uploads.about=ab.value;scheduleDraftSave();});
    document.getElementById('img-input').addEventListener('change',async e=>{
      for(const f of Array.from(e.target.files).slice(0,4-uploads.images.length)){
        const data = await new Promise((res,rej)=>{
          const r=new FileReader();
          r.onload=()=>res(r.result.split(',')[1]);
          r.onerror=()=>rej(new Error('read failed'));
          r.readAsDataURL(f);
        });
        uploads.images.push({media_type:f.type,data});
      }
      render();
    });
  }
}
function refreshNext(q){
  const b=document.getElementById('next-btn');
  if(b) b.disabled = !answered(q.id);
}

/* ---------- Q3 drag-and-drop ranking ---------- */
/* Custom POINTER-based drag (mouse + touch), not native HTML5 DnD which is
   flaky and doesn't work on touch. Drag a motive into a numbered slot to
   rank it, drag between slots to reorder, drag back to the pool to remove.
   A plain tap on a pool option also places it (convenience). */
function wireRank(q){
  const slotsEl=document.getElementById('rank-slots');
  const poolEl=document.getElementById('rank-pool');
  const getSel=()=>answers[q.id]||[];
  const setSel=arr=>{ answers[q.id]=arr; scheduleDraftSave(); render(); };
  function placeAt(v, slotIdx){
    let sel=getSel().filter(x=>x!==v);
    if(slotIdx==null||slotIdx<0) slotIdx=sel.length;
    slotIdx=Math.max(0,Math.min(slotIdx, sel.length, q.max-1));
    sel.splice(slotIdx,0,v);
    if(sel.length>q.max) sel=sel.slice(0,q.max);
    setSel(sel);
  }
  function remove(v){ setSel(getSel().filter(x=>x!==v)); }

  let drag=null;
  function clearOver(){ slotsEl.querySelectorAll('.rank-slot').forEach(s=>s.classList.remove('over')); poolEl.classList.remove('over'); }
  function targetAt(x,y){
    drag.ghost.style.display='none';
    const el=document.elementFromPoint(x,y);
    drag.ghost.style.display='';
    return el;
  }
  function onMove(e){
    if(!drag) return;
    e.preventDefault();
    drag.moved=true;
    drag.ghost.style.left=(e.clientX-drag.dx)+'px';
    drag.ghost.style.top=(e.clientY-drag.dy)+'px';
    const el=targetAt(e.clientX,e.clientY);
    clearOver();
    const slot=el&&el.closest('.rank-slot');
    if(slot) slot.classList.add('over');
    else if(el&&el.closest('#rank-pool')) poolEl.classList.add('over');
  }
  function onUp(e){
    window.removeEventListener('pointermove',onMove);
    window.removeEventListener('pointerup',onUp);
    if(!drag) return;
    const {v,ghost,moved}=drag;
    const el=targetAt(e.clientX,e.clientY);
    ghost.remove(); clearOver(); drag=null;
    const slot=el&&el.closest('.rank-slot');
    if(slot) placeAt(v, +slot.dataset.slot);          /* onto a slot -> rank there */
    else if(getSel().includes(v)) remove(v);          /* a ranked chip dragged off the slots -> remove */
    else if(!moved) placeAt(v,null);                  /* a tap on a pool option -> place */
    else render();                                    /* pool option dropped nowhere -> restore */
  }
  function onDown(e){
    if(e.button!=null && e.button>0) return;
    const chip=e.currentTarget, v=chip.dataset.v;
    e.preventDefault();
    const r=chip.getBoundingClientRect();
    const ghost=chip.cloneNode(true);
    ghost.classList.add('rank-ghost');
    ghost.style.cssText='position:fixed;left:'+r.left+'px;top:'+r.top+'px;width:'+r.width+'px;height:'+r.height+'px;margin:0;pointer-events:none;z-index:2000';
    document.body.appendChild(ghost);
    chip.classList.add('drag-source');
    drag={v,ghost,dx:e.clientX-r.left,dy:e.clientY-r.top,moved:false};
    window.addEventListener('pointermove',onMove,{passive:false});
    window.addEventListener('pointerup',onUp);
  }
  document.querySelectorAll('.rank-chip[data-v]').forEach(chip=>chip.addEventListener('pointerdown',onDown));
}

/* =========================================================
   PROFILE ENGINE — Claude API
   ========================================================= */

/* ---------- profile generation prompt, split into 3 groups that run as
   parallel Claude calls (see runGeneration) so Opus's depth is affordable
   time-wise: each call only has to write ~1/3 of the profile. ---------- */
const PROFILE_HEADER = `
You are an expert personality psychologist profiling a person for a LinkedIn ghostwriting platform. Your job is to READ A PERSON, not to summarize a form.

CRITICAL — INFER, DON'T ECHO: Never restate or lightly paraphrase what the user wrote, and NEVER quote their answers back word-for-word. Every insight must be an INFERENCE that goes beyond the surface of their answers — read between the lines, connect signals across different questions, name the underlying trait/drive/tension the person may not even see about themselves. If a line could be produced just by rephrasing one answer, it is wrong; replace it with what that answer REVEALS about who they are.
Example — if the user answered "I like planning everything in advance": a BAD evidence line is "she likes to plan ahead" (that's just the answer restated). A GOOD evidence line is "needs certainty before she'll commit to anything" (that's what the answer reveals about her).

PLAIN LANGUAGE: write for a smart everyday reader ("the average Joe"), not for psychologists. Explain what you see in warm, clear, jargon-free words. When you draw on a framework (Big 5, Enneagram, Hofstede, etc.), translate it into plain human terms rather than naming clinical constructs — the insight should land, not sound like a textbook.

LANGUAGE: write the ENTIRE response in {LANG} only — every field, with no exceptions. Never insert words, phrases, or quotes from another language, not even a single term. If {LANG} is Hebrew, address the reader in gender-neutral Hebrew (plural forms like את/ה, אתם — never a masculine-only conjugation), matching the rest of this app.

GRAMMAR AND FLUENCY (STRICT): every single value must be a complete, grammatically correct, natural-sounding sentence or clause in {LANG} — never a broken fragment, never a construction that only makes sense translated literally from English. If {LANG} is Hebrew: write the way a fluent native Hebrew speaker actually talks, with correct subject-verb agreement and natural word order — do NOT invent awkward metaphors or compressed poetic images (e.g. no "מנוע שקט של רצון", no machinery/engine metaphors) just to sound literary; plain direct Hebrew beats a clever but broken sentence. Before outputting each field, silently check it reads smoothly out loud — if it sounds odd, choppy, or grammatically wrong, rewrite it simpler even if that means using a few more words than the target length.

PUNCTUATION: never use an em dash (—) anywhere, in any field, for any reason. Use a comma, period, or a new sentence instead.
`;

const FRAMEWORK_BIG5 = `
BIG 5 — score each 1-5 using both closed answers AND language markers in free text (open-vocabulary method, Park et al. 2014):
- Extraversion: social words, exclamation marks, emojis, short energetic sentences, calls to action vs. reflective first-person, longer sentences, ellipses.
- Openness: metaphors, abstract/idea words, original syntax, varied topics vs. concrete, practical, routine language.
- Conscientiousness: planning words, structured syntax, standard punctuation vs. "we'll see", topic-jumping, casual flow.
- Agreeableness: warm words (thanks, together, appreciate), soft phrasing, hearts vs. sharp, competitive, blunt language.
- Neuroticism: stress words, multiple !!/..., dramatic phrasing vs. calm, solution-focused, proportionate language.
`;

const FRAMEWORK_MOTIVES = `
MOTIVES (score the user's top 3 from their ranking Q3 + free text evidence): achievement, power/influence, recognition, security, belonging/acceptance, meaning/spiritual, thrill/risk, pleasure/hedonism, altruism, material. Motives answer WHY the person acts; traits answer HOW. Flag any contradiction between declared ranking and language evidence.
`;

const FRAMEWORK_ENNEAGRAM = `
ENNEAGRAM (from Q2 worldview + corroborating evidence): e1=Perfectionist, e2=Helper, e3=Performer, e4=Individualist, e5=Investigator, e6=Loyalist, e7=Enthusiast, e8=Challenger, e9=Peacemaker. Give type number, name, and the core inner motivation.
`;

const FRAMEWORK_COGNITIVE = `
COGNITIVE ORIENTATION (mainly from Q6+Q9+posts):
- convergent (one precise solution, data, process) vs divergent (many possibilities, connections, "what if").
- systemizer (how systems work: data, frameworks, SOPs) vs empathizer (how people feel: stories, motives, relationships).
`;

const FRAMEWORK_WRITING_DNA = `
WRITING DNA (from Q1, Q6, and pasted posts — the pasted posts are the STRONGEST signal, weight them most):
- language: the language(s) they ACTUALLY write in, read from their real writing samples and open answers (not from the language of this response) — but name it as a short LABEL written in {LANG} itself (e.g. if {LANG} is Hebrew, write something like "אנגלית" or "אנגלית מעורבת בעברית" — a Hebrew label describing their language, never the literal English word). Separately, also give primary_lang_code: the ONE dominant language as a strict "he" or "en" code (pick whichever is more dominant even if they mix) — this code is used elsewhere in the app to pick a default writing language, so it must stay a bare code, never translated.
- average sentence length, punctuation habits (exclamations? ellipses? dashes?), emoji usage (which/none), hook style, humor type, signature_phrases: 2-3 SHORT descriptions (in {LANG}) of their characteristic phrasing or go-to word choices, IN YOUR OWN WORDS — do NOT copy their sentences verbatim, first/second person habits, how they end posts (question? statement? CTA?).
- Also produce 3 DO rules and 3 DON'T rules for ghostwriting this person. Make them specific and actionable (not generic advice) — grounded in the actual evidence from their answers and posts.
`;

const FRAMEWORK_LOCALIZATION = `
LOCALIZATION — language & culture fit (from writing language, phrasing, cultural references in Q1/Q6/posts/About):
- audience: who they write for and the market/culture they operate in.
- language_mix: primary language and how they blend languages (loanwords, code-switching, foreign terms inside their main language, etc.) — described as a short LABEL written in {LANG}, same rule as writing_dna.language: name the languages involved, but write the label itself entirely in {LANG}.
- cultural_markers: local references, idioms, humor style, sensibilities that fit their audience.
- formality: how formal/informal and how they address the reader (ata/at, plural, first-name energy).
- note: one short line on how to keep a post culturally native to them.
Anchor on the declared country/market (USER CONTEXT) combined with the language evidence, not country stereotypes. Use Hofstede's 6 cultural dimensions as a qualitative lens (power distance, individualism/collectivism, masculinity/femininity, uncertainty avoidance, long/short-term, indulgence/restraint) only where actually visible in their writing.
`;

const FRAMEWORK_STORYTELLING = `
STORYTELLING — how they narrate (from Q1, Q6, Q9 and posts):
- structure: how they build a post (e.g. hook → tension → turn → lesson → close), described from their real patterns.
- signature_moves: 2 narrative devices they actually use (each ≤6 words).
- templates: 2 short reusable story skeletons that fit them (each one short line).
- note: one short line on what makes their storytelling land.
Name the closest battle-tested shape in "structure" (Three-Act, PAS, AIDA, BAB, Hero's Journey, StoryBrand, or In Medias Res) rather than inventing vocabulary — whichever actually fits; build "templates" as short skeletons of that shape from their real material.
`;

const FRAMEWORK_IMAGES = `
If profile pictures are provided, use profile-image research: positive emotion + single frontal face → conscientiousness/agreeableness/extraversion signals; aesthetic/unconventional composition → openness; no face/low emotion → openness or neuroticism direction. Treat as weak supporting evidence only.
`;

const CROSS_CHECK = `
CROSS-CHECKING: actively look for contradictions between closed answers and free-text style (e.g., claims introvert but writes with high-energy social markers). List them in "gaps".
`;

/* each call now only writes ~1/3 of the profile, so there's still room for a
   full, grammatical clause even at this budget */
const LENGTH_BUDGET = `
LENGTH BUDGET (STRICT — the response is time-limited, so a complete, tight profile matters more than a thorough one): keep every evidence line, note, do/dont rule, and list item short (max ~16 words) — but it must still be a complete, natural, grammatically whole sentence or clause, never a chopped fragment. No sub-clauses, no examples-in-parentheses, no restating the field name. Total output must stay compact — if in doubt, cut a whole item rather than mangling a sentence to fit. Depth comes from precision, not length.
`;

function groupPrompt(fw, schema){
  return PROFILE_HEADER + fw + LENGTH_BUDGET +
    `\nRespond with ONLY valid JSON, no markdown fences, no preamble. Keep list items to short phrases, BUT the "summary"/"evidence"/"note" fields must be real inference (see the example above), never a restated or lightly-reworded answer. JSON schema:\n${schema}\nAll free-text values, including writing_dna.language and localization.language_mix, must be written entirely in {LANG} — in plain everyday language, with no verbatim quotes of the user's answers and no words borrowed from another language.`;
}

const GROUP_PROMPTS = {
  core: groupPrompt(FRAMEWORK_BIG5 + FRAMEWORK_MOTIVES + FRAMEWORK_ENNEAGRAM + FRAMEWORK_IMAGES, `{
 "summary": "A tight 2-3 sentence psychological portrait in {LANG}, second person, warm but insightful — their defining tension and what really drives them. Feel truly seen, not summarized. No quotes, no filler.",
 "visual_impression": "One short vivid sentence in {LANG} (max ~16 words), third person, describing how you picture this person physically/in a scene based on their profile (e.g. posture, expression, a small telling habit) — an impression, not a literal photo description. Plain language, no clichés, no framework talk.",
 "big5": {"openness":{"score":1-5,"evidence":"a short, complete, natural sentence: the INFERENCE you drew, not a restated answer"},"conscientiousness":{...},"extraversion":{...},"agreeableness":{...},"neuroticism":{...}},
 "motives": [{"id":"...","label_he":"...","label_en":"...","note":"short inference, not the ranking restated"} x3],
 "enneagram": {"type":N,"name_he":"...","name_en":"...","core":"short"}
}`),
  voice: groupPrompt(FRAMEWORK_COGNITIVE + FRAMEWORK_WRITING_DNA, `{
 "cognitive": {"convergent_divergent":"convergent|divergent|balanced","systemizer_empathizer":"systemizer|empathizer|balanced","note":"short"},
 "writing_dna": {"language":"short label in {LANG} — see WRITING DNA rule above","primary_lang_code":"he|en — strict code, see WRITING DNA rule above","sentence_length":"short","punctuation":"short","emoji":"short","hook_style":"short","humor":"short","signature_phrases":["...","..."],"endings":"short","do":["...","...","..."],"dont":["...","...","..."]}
}`),
  context: groupPrompt(FRAMEWORK_LOCALIZATION + FRAMEWORK_STORYTELLING + CROSS_CHECK, `{
 "localization": {"audience":"short","language_mix":"short label in {LANG} — see LOCALIZATION rule above","cultural_markers":"short","formality":"short","note":"short"},
 "storytelling": {"structure":"short","signature_moves":["...","..."],"templates":["...","..."],"note":"short"},
 "gaps": ["...( empty array if none )"]
}`),
};

/* second pass: the 3 group calls above run in parallel and never see each
   other's output, so this pass re-reads the merged draft as a whole to
   catch cross-section contradictions and any line that's really just a
   restated answer rather than a genuine inference */
const FULL_PROFILE_SCHEMA = `{
 "summary": "...", "visual_impression": "...",
 "big5": {"openness":{"score":1-5,"evidence":"..."},"conscientiousness":{...},"extraversion":{...},"agreeableness":{...},"neuroticism":{...}},
 "motives": [{"id":"...","label_he":"...","label_en":"...","note":"..."} x3],
 "enneagram": {"type":N,"name_he":"...","name_en":"...","core":"..."},
 "cognitive": {"convergent_divergent":"...","systemizer_empathizer":"...","note":"..."},
 "writing_dna": {"language":"...","primary_lang_code":"he|en","sentence_length":"...","punctuation":"...","emoji":"...","hook_style":"...","humor":"...","signature_phrases":["...","..."],"endings":"...","do":["...","...","..."],"dont":["...","...","..."]},
 "localization": {"audience":"...","language_mix":"...","cultural_markers":"...","formality":"...","note":"..."},
 "storytelling": {"structure":"...","signature_moves":["...","..."],"templates":["...","..."],"note":"..."},
 "gaps": ["..."]
}`;

const CRITIQUE_PROMPT = `
You wrote a personality/writing profile for a LinkedIn ghostwriting platform, generated as three parallel drafts (personality core, cognitive/voice, localization/storytelling) that could not see each other. Review the MERGED draft below as a whole and fix it.

For every "evidence"/"note"/list item, check:
1. Is it a genuine INFERENCE, or does it just restate/paraphrase an answer? Replace any restatement with what the answer actually reveals about the person.
2. Is it consistent with the rest of the profile? (e.g. a low extraversion score next to a writing_dna.hook_style built on big energetic calls-to-action is a contradiction — resolve it using the actual evidence below, and if it's a real tension worth surfacing rather than an error, add a short line to "gaps".)
3. Does every field follow the grammar, fluency, gender-neutral-Hebrew, and no-em-dash rules from the original instructions? Fix any that don't.

Keep the same length discipline as the draft: each evidence/note/list item ~16 words, "summary" and "visual_impression" as specified originally. Respond with ONLY the corrected full JSON, same schema, no markdown fences, no preamble. All free-text values in {LANG}, with no verbatim quotes of the user's answers. Schema:
${FULL_PROFILE_SCHEMA}
`;

function buildQAText(){
  return QUESTIONS.filter(q=>q.type!=='uploads').map(q=>{
    let a = answers[q.id];
    if(q.type==='single'){const o=q.opts.find(x=>x.v===a);a = a+' — '+(o?o.en:'');}
    if(q.type==='rank'){a = (a||[]).map((v,i)=>`${i+1}. ${v}`).join(' | ');}
    return `Q ${q.id} (${q.en.t}):\n${a}`;
  }).join('\n\n');
}

function buildUserContent(group){
  const qa = buildQAText();
  const noLi=uploads.noLinkedIn;
  const groupText = GROUP_PROMPTS[group].replaceAll('{LANG}', lang==='he'?'Hebrew':'English');
  let text = '=== USER CONTEXT ===\nName: ' + (profileName||'-')
    + '\nCountry/market: ' + (countryName(profileCountry,'en')||'not specified')
    + (noLi?'\nNote: this person does NOT have a LinkedIn profile — the writing sample below is general (not LinkedIn posts), so weight it as their natural voice and infer the LinkedIn fit rather than assuming existing LinkedIn habits.':'')
    + '\n\n=== QUESTIONNAIRE ANSWERS ===\n' + qa;
  if(uploads.posts.trim()) text += (noLi?'\n\n=== USER\'S WRITING SAMPLE (general, not from LinkedIn — strongest style signal) ===\n':'\n\n=== USER\'S REAL LINKEDIN POSTS (strongest style signal) ===\n')+uploads.posts.trim();
  if(uploads.about.trim()) text += (noLi?'\n\n=== ABOUT THE USER (self-described) ===\n':'\n\n=== LINKEDIN ABOUT ===\n')+uploads.about.trim();

  /* each group's instructions are identical for every user calling that group
     (in any given language), so they're the cached block — same pattern as the
     old single-CODEX cache, just split three ways. Short prompts may fall under
     the provider's minimum cacheable size and simply no-op, which is harmless. */
  const content=[
    {type:'text', text:groupText, cache_control:{type:'ephemeral'}},
    {type:'text', text}
  ];
  /* profile pictures only inform Big 5 / motives / enneagram (the "core"
     group) — no point re-sending image bytes to the other parallel calls */
  if(group==='core') uploads.images.forEach(im=>content.push({type:'image',source:{type:'base64',media_type:im.media_type,data:im.data}}));
  return content;
}

async function callClaude(content, useSearch, maxTokens, model, onDelta){
  const headers={'Content-Type':'application/json'};
  const token = window.__getToken ? await window.__getToken() : '';
  if(token) headers['Authorization']='Bearer '+token;
  const response = await fetch('/api/claude',{
    method:'POST',
    headers,
    body:JSON.stringify({
      model:model||'claude-sonnet-5',
      max_tokens:maxTokens||8000,
      /* adaptive thinking — Sonnet 5's near-Opus quality on nuanced language/
         reasoning tasks depends on this; disabling it (as before) was actively
         working against profile accuracy. Streaming already keeps us well
         inside the serverless time limit regardless of thinking. */
      thinking:{type:'adaptive'},
      messages:[{role:'user',content}],
      ...(useSearch?{tools:[{type:'web_search_20250305',name:'web_search'}]}:{})
    })
  });
  /* read as text first: a timed-out or crashed serverless function returns an
     HTML/plain error page, and response.json() would blow up with a cryptic
     "Unexpected token" instead of a usable message */
  const __ct=response.headers.get('content-type')||'';
  const __isStream=!!response.body && __ct.indexOf('event-stream')>=0;
  let __streamText='', __stopReason=null, __streamErr=null;
  if(__isStream){
    const __reader=response.body.getReader();
    const __dec=new TextDecoder();
    let __buf='';
    const __handle=line=>{
      const s=line.trim();
      if(s.indexOf('data:')!==0) return;
      const j=s.slice(5).trim();
      if(!j||j==='[DONE]') return;
      try{
        const e=JSON.parse(j);
        if(e.type==='content_block_delta'&&e.delta&&typeof e.delta.text==='string') __streamText+=e.delta.text;
        else if(e.type==='message_delta'&&e.delta&&e.delta.stop_reason) __stopReason=e.delta.stop_reason;
        else if(e.type==='error'&&e.error) __streamErr=e.error;
      }catch(_){/* skip partial/keepalive lines */}
    };
    while(true){
      const{done,value}=await __reader.read();
      if(done) break;
      __buf+=__dec.decode(value,{stream:true});
      const parts=__buf.split('\n');
      __buf=parts.pop();
      for(const line of parts) __handle(line);
      if(onDelta) onDelta(__streamText);
    }
    if(__buf) __handle(__buf); /* flush any trailing line without a newline */
  }
  const raw=__isStream
    ? JSON.stringify({content:[{type:'text',text:__streamText}],stop_reason:__stopReason,error:__streamErr})
    : await response.text();
  let data;
  try{ data = JSON.parse(raw); }
  catch(_){
    const snippet = raw.replace(/<[^>]*>/g,' ').replace(/\s+/g,' ').trim().slice(0,120);
    if(response.status===504 || /timeout|timed out/i.test(raw))
      throw new Error('The server took too long and timed out. Please try again.');
    throw new Error('Server error (HTTP '+response.status+'): '+(snippet||'no details'));
  }
  if(data.error && data.error.type==='usage_limit_reached') throw new Error(T().err_usage_limit);
  if(data.error) throw new Error(data.error.message||'API error');
  if(!response.ok) throw new Error('Server error (HTTP '+response.status+')');
  const txt = (data.content||[]).filter(i=>i.type==='text').map(i=>i.text).join('\n');
  /* a cut-off response (hit the token cap) leaves the JSON unterminated;
     say so plainly instead of the cryptic "No JSON in response" */
  if(data.stop_reason==='max_tokens') throw new Error('The response was cut off (reached the length limit). Try again.');
  /* pause_turn = Claude paused to run a server tool (web search) and expects a
     continuation this single-shot call doesn't provide. Insight generation uses
     no search, so this only guards the composer's optional link-reading. */
  if(data.stop_reason==='pause_turn') throw new Error('That step needed an external lookup that didn\'t finish. Try again, or remove the link.');
  const __sr = data.stop_reason ? ' [stop:'+data.stop_reason+']' : '';
  if(!txt || !txt.trim()) throw new Error('The model returned an empty response'+__sr+'. Please try again.');
  try{ return sanitizeDeep(extractJSON(txt)); }
  catch(_){
    const clip=txt.trim().replace(/\s+/g,' ').slice(0,90);
    throw new Error('Could not read the result'+__sr+' — it began: "'+clip+'…"');
  }
}

/* hard guarantee (independent of the model following instructions): strip
   em dashes from every generated string before it ever reaches the screen */
function stripEmDash(s){
  if(typeof s!=='string') return s;
  return s.replace(/\s*—\s*/g,', ').replace(/,\s*,/g,',').replace(/,\s*([.!?])/g,'$1').trim();
}
function sanitizeDeep(val){
  if(typeof val==='string') return stripEmDash(val);
  if(Array.isArray(val)) return val.map(sanitizeDeep);
  if(val && typeof val==='object'){
    const out={};
    for(const k in val) out[k]=sanitizeDeep(val[k]);
    return out;
  }
  return val;
}

/* pull the first complete top-level JSON object out of a text blob,
   ignoring any commentary the model may have added before/after it */
function extractJSON(txt){
  txt = txt.replace(/```(?:json)?/gi,''); /* drop any markdown code fences the model may add */
  const start = txt.indexOf('{');
  if(start===-1) throw new Error('No JSON in response');
  let depth=0, inStr=false, esc=false;
  for(let i=start;i<txt.length;i++){
    const ch=txt[i];
    if(inStr){
      if(esc) esc=false;
      else if(ch==='\\') esc=true;
      else if(ch==='"') inStr=false;
    }else{
      if(ch==='"') inStr=true;
      else if(ch==='{') depth++;
      else if(ch==='}'){ depth--; if(depth===0) return JSON.parse(txt.slice(start,i+1)); }
    }
  }
  throw new Error('No JSON in response');
}

function generateHTML(){
  const t=T();
  runGeneration();
  return `<div class="step active loading">
    <div class="pulse"></div>
    <p id="loading-msg">${t.analyzing[0]}</p>
    <p id="loading-preview" class="loading-preview"></p>
  </div>`;
}

/* pull out the growing "summary" string from a streaming, still-incomplete
   JSON blob so the loading screen can show the profile being written live */
function partialInsightPreview(raw){
  const m = raw.match(/"summary"\s*:\s*"((?:[^"\\]|\\.)*)/);
  if(!m) return '';
  let s = m[1];
  if(s.endsWith('\\')) s = s.slice(0,-1);
  return s.replace(/\\n/g,' ').replace(/\\"/g,'"').replace(/\\\\/g,'\\');
}

let loadTimer=null;
async function runGeneration(refineNote){
  const t=T();
  let i=0;
  clearInterval(loadTimer);
  loadTimer=setInterval(()=>{
    i=(i+1)%t.analyzing.length;
    const el=document.getElementById('loading-msg');
    if(el) el.textContent=t.analyzing[i];
  },2200);

  try{
    if(refineNote && profile){
      const existingPhoto = profile.photo;
      const content=[{type:'text',text:
        `Here is an existing personality/writing profile JSON:\n${JSON.stringify({...profile, photo:undefined})}\n\nThe user corrected it: "${refineNote}"\n\nApply the correction thoughtfully (adjust related fields too, e.g. if they say "I never use emojis" fix writing_dna.emoji and the do/dont rules). Respond with ONLY the full updated JSON, same schema, no fences. Free-text values in ${lang==='he'?'Hebrew':'English'}.`}];
      profile = await callClaude(content, false, 16000, 'claude-sonnet-5');
      profile.photo = existingPhoto; /* a correction doesn't change how they look */
    } else {
      /* 3 independent calls in parallel, each writing a disjoint slice of the
         profile — cuts wall-clock time vs. one call writing everything in
         sequence, which is what makes Opus's extra depth affordable here. A
         4th, cheaper pass then reviews the merged result as a whole (see
         CRITIQUE_PROMPT) since the 3 calls never see each other's output. */
      const onDelta = raw=>{
        const preview = partialInsightPreview(raw);
        if(!preview) return;
        clearInterval(loadTimer);
        const msgEl=document.getElementById('loading-msg');
        if(msgEl) msgEl.textContent=t.analyzing[t.analyzing.length-1];
        const prevEl=document.getElementById('loading-preview');
        if(prevEl) prevEl.textContent=preview;
      };
      const [core, voice, context] = await Promise.all([
        callClaude(buildUserContent('core'), false, 12000, 'claude-opus-4-8', onDelta),
        callClaude(buildUserContent('voice'), false, 12000, 'claude-opus-4-8'),
        callClaude(buildUserContent('context'), false, 12000, 'claude-opus-4-8'),
      ]);
      const draft = Object.assign({}, core, voice, context);
      try{
        const critiqueContent=[{type:'text',text:
          CRITIQUE_PROMPT.replaceAll('{LANG}', lang==='he'?'Hebrew':'English')
          + '\n\n=== QUESTIONNAIRE ANSWERS ===\n' + buildQAText()
          + '\n\n=== MERGED DRAFT PROFILE ===\n' + JSON.stringify(draft)}];
        profile = await callClaude(critiqueContent, false, 16000, 'claude-opus-4-8');
      }catch(critiqueErr){
        console.warn('profile critique pass failed, using merged draft as-is', critiqueErr);
        profile = draft;
      }
      if(uploads.images.length) profile.photo = { media_type: uploads.images[0].media_type, data: uploads.images[0].data, source:'upload' };
    }
    profile._lang = lang;
    profile._name = profileName;
    profile._country = profileCountry;
    profileVariants = { [lang]: profile }; /* fresh analysis → drop any stale translations */
    { const e = activeProfileId ? profilesStore.profiles.find(p=>p.id===activeProfileId) : null; if(e) e.variants = { [lang]: profile }; }
    clearInterval(loadTimer);
    step=QUESTIONS.length+1; approved=false; render();
    /* no uploaded photo → generate one in the background; the results page
       already shows the initials placeholder + text impression while this runs */
    if(!refineNote && !uploads.images.length) generateAvatarImage(profile);
  }catch(err){
    clearInterval(loadTimer);
    console.error('Claude API error:',err);
    const card=document.getElementById('main-card');
    card.innerHTML=`<div class="step active">
      <div class="error-box">${t.err_api}<br><small style="opacity:.7">${(err&&err.message)||''}</small></div>
      ${String(err&&err.message).includes('fetch')?`
      <div class="gap-note" style="margin-top:14px">
        <b>${lang==='he'?'פתרון: מפתח API אישי':'Fix: personal API key'}</b><br>
        ${lang==='he'?'הקובץ רץ מחוץ ל-Claude, אז צריך מפתח משלכם (אותו אחד מהגנרטור). הוא לא נשמר בשום מקום - רק בזיכרון של העמוד.':'The file runs outside Claude, so it needs your own key. It is not stored anywhere - memory only.'}<br>
        <input type="text" id="api-key-input" style="min-height:auto;margin-top:8px" placeholder="sk-ant-..." value="${apiKey}">
      </div>`:''}
      <div class="nav"><button class="btn btn-ghost" onclick="step=${QUESTIONS.length-1};render()">${t.back}</button>
      <button class="btn btn-primary" onclick="const k=document.getElementById('api-key-input');if(k)apiKey=k.value.trim();step=${QUESTIONS.length};render()">${t.retry}</button></div></div>`;
  }
}

function avatarPrompt(p){
  const country = countryName(profileCountry,'en')||'';
  return `Realistic professional headshot photo of a person, based on this impression: ${p.visual_impression||p.summary||''}. `+
    (country?`They are based in ${country}. `:'')+
    `Extreme close-up crop: face and shoulders fill the ENTIRE frame edge-to-edge, like a tightly-cropped LinkedIn profile picture or passport photo — no empty space, margin, or background border visible around the subject. Square 1:1 aspect ratio. Natural lighting, simple background directly behind the subject (not visible around the edges), photorealistic, no text, no watermark, no logo.`;
}

/* runs in the background after a fresh (non-refine) generation when no photo
   was uploaded; a failure here is silent — the initials placeholder stays and
   the rest of the profile is unaffected */
async function generateAvatarImage(forProfile){
  try{
    const headers={'Content-Type':'application/json'};
    const token = window.__getToken ? await window.__getToken() : '';
    if(token) headers['Authorization']='Bearer '+token;
    const response = await fetch('/api/image',{
      method:'POST', headers,
      body:JSON.stringify({prompt:avatarPrompt(forProfile)})
    });
    const data = await response.json();
    if(!response.ok || data.error) throw new Error((data.error&&data.error.message)||'Image generation failed');
    if(profile!==forProfile) return; /* user moved on (new/refined/switched profile) before this resolved */
    profile.photo = { media_type: data.media_type, data: data.data, source:'generated' };
    const entry = activeProfileId ? profilesStore.profiles.find(p=>p.id===activeProfileId) : null;
    if(entry){ entry.profile = profile; persistProfiles().catch(()=>{}); }
    if(step===QUESTIONS.length+1) render();
  }catch(err){
    console.error('avatar image generation failed:', err);
  }
}

/* keep the generated profile in sync with the UI language — this only
   re-translates the tool's own analysis text, never the user's answers
   or the ghostwritten post (that stays in the person's real voice) */
/* per-profile store of already-generated language versions */
function langVariants(){
  const entry = activeProfileId ? profilesStore.profiles.find(p=>p.id===activeProfileId) : null;
  if(entry){ entry.variants = entry.variants || {}; return entry.variants; }
  return profileVariants;
}
function applyProfileLang(p,target){
  p._lang = target;
  profile = p;
  const entry = activeProfileId ? profilesStore.profiles.find(x=>x.id===activeProfileId) : null;
  if(entry){ entry.profile=profile; entry.lang=target; persistProfiles().catch(()=>{}); }
}

async function translateProfile(target){
  if(!profile) return;
  const cur = profile._lang || lang;
  if(cur===target) return;
  const vars = langVariants();
  /* remember the version we're leaving so we can come back to it instantly */
  vars[cur] = profile;
  /* already have this language? just revert — never regenerate */
  if(vars[target]){
    applyProfileLang(vars[target], target);
    if(step===QUESTIONS.length+1) render();
    return;
  }
  const onProfileStep = step===QUESTIONS.length+1;
  const card = document.getElementById('main-card');
  if(onProfileStep && card){
    card.innerHTML = `<div class="step active loading"><div class="pulse"></div><p>${target==='he'?'כותב את הפרופיל בעברית...':'Writing your profile in English...'}</p></div>`;
  }
  let failed=false, errMsg='';
  try{
    const content=[{type:'text',text:
      `Here is an existing personality/writing profile JSON:\n${JSON.stringify({...profile, photo:undefined})}\n\nRe-express this SAME profile in ${target==='he'?'Hebrew':'English'}, written NATIVELY — as if it had been authored in ${target==='he'?'Hebrew':'English'} from the start. Do NOT do a stiff word-for-word translation: use natural phrasing, idiom and rhythm of ${target==='he'?'Hebrew':'English'} so it reads like an original, while keeping the exact same meaning, insights and judgments. Keep the exact same JSON schema, field names, and array lengths and order — same analysis, new language. EVERY field including writing_dna.language and localization.language_mix must be written entirely in ${target==='he'?'Hebrew':'English'} too (they are short labels naming the user's real writing language, phrased in ${target==='he'?'Hebrew':'English'} words — never leave them in the other language). EXCEPT writing_dna.primary_lang_code — that is a strict "he" or "en" code, not text to translate; copy it through completely unchanged. ${target==='he'?'If Hebrew, address the reader in gender-neutral plural forms (את/ה, אתם), never masculine-only.':''} Output nothing but the JSON object, no markdown fences, no preamble, no trailing commentary.`}];
    const translated = await callClaude(content, false, 16000, 'claude-sonnet-5');
    translated._lang = target;
    translated.photo = profile.photo; /* translation never touches the photo */
    vars[target] = translated;
    applyProfileLang(translated, target);
  }catch(err){
    console.error('profile translation failed:',err);
    failed=true; errMsg=(err&&err.message)||'';
  }
  if(step===QUESTIONS.length+1){
    render();
    if(failed && card){
      const t=T();
      card.insertAdjacentHTML('beforeend',`<div class="gap-note" id="translate-err" style="margin-top:14px">${target==='he'?'התרגום האוטומטי נכשל - עדיין מוצג בשפה הקודמת.':'Automatic translation failed - still showing the previous language.'} <button class="btn btn-ghost" style="padding:6px 16px;margin-top:8px" onclick="document.getElementById('translate-err').remove();translateProfile('${target}')">${t.retry}</button><br><small style="opacity:.6">${escapeHtml(errMsg)}</small></div>`);
    }
  }
}

/* ---------- profile view ---------- */
const AVATAR_FALLBACK_SVG = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4.4 3.6-7 8-7s8 2.6 8 7"/></svg>`;

function profileHTML(){
  const t=T(), p=profile;
  const traits=['openness','conscientiousness','extraversion','agreeableness','neuroticism'];
  const traitGrads=['var(--g-blue)','var(--g-orange)','var(--g-pink)','var(--g-green)','var(--g-lime)'];
  const bars = traits.map((tr,ti)=>{
    const d=p.big5[tr]||{score:3,evidence:''};
    return `<div class="trait-row">
      <span class="trait-name">${t.traits[tr]}</span>
      <div class="trait-bar"><div class="trait-fill" style="width:${d.score*20}%;background:${traitGrads[ti%traitGrads.length]}"></div></div>
      <span class="trait-score">${d.score}</span>
    </div>
    <div class="char-note" style="margin:-6px 0 12px">${t.ev}: ${d.evidence||''}</div>`;
  }).join('');

  const motiveGrads=['var(--g-pink)','var(--g-blue)','var(--g-orange)'];
  const motives=(p.motives||[]).map((m,i)=>
    `<span class="chip chip-block" style="background:${motiveGrads[i%motiveGrads.length]};color:var(--on-primary);border-color:transparent">${lang==='he'?(m.label_he||m.id):(m.label_en||m.id)}${m.note?` · ${m.note}`:''}</span>`).join('');

  const en=p.enneagram||{};
  const cg=p.cognitive||{};
  const dna=p.writing_dna||{};
  const dnaRows=[
    dna.language,dna.sentence_length,dna.punctuation,dna.emoji,
    dna.hook_style,dna.humor,dna.endings
  ].filter(Boolean).map(v=>`<li>${v}</li>`).join('');
  const sigs=(dna.signature_phrases||[]).map(s=>`<span class="chip">${s}</span>`).join('');

  const loc=p.localization||{};
  const locRows=[
    loc.audience,loc.language_mix,loc.cultural_markers,loc.formality
  ].filter(Boolean).map(v=>`<li>${v}</li>`).join('');

  const st=p.storytelling||{};
  const stMoves=(st.signature_moves||[]).map(s=>`<span class="chip">${s}</span>`).join('');
  const stTemplates=(st.templates||[]).map(s=>`<li>${s}</li>`).join('');

  const gaps=(p.gaps&&p.gaps.length)?`<div class="gap-note"><b>${t.gaps_h}</b><br>${p.gaps.join('<br>')}</div>`:'';

  /* merged writing rules — do + dont together, no separate headers, just a subtle
     colored marker per item so it's still easy to tell them apart at a glance */
  const rules=[
    ...(dna.do||[]).map(x=>({text:x,kind:'do'})),
    ...(dna.dont||[]).map(x=>({text:x,kind:'dont'}))
  ].map(r=>`<li class="rule-${r.kind}">${r.text}</li>`).join('');

  /* six colored, horizontally-scrollable model cards */
  const layerColors=['var(--g-blue)','var(--g-pink)','var(--g-green)','var(--g-lime)','var(--g-orange)','var(--g-blue)'];
  const layers=[
    {label:t.big5_h, body:bars},
    {label:t.motives_h, body:motives||'—'},
    {label:t.ennea_h, body:`<span class="chip hot">${lang==='he'?(en.name_he||''):(en.name_en||'')} · ${en.type||''}</span><div class="char-note">${en.core||''}</div>`},
    {label:t.cog_h, body:`<span class="chip">${cg.convergent_divergent||''}</span> <span class="chip">${cg.systemizer_empathizer||''}</span><div class="char-note">${cg.note||''}</div>`},
    {label:t.local_h, body:`<ul class="dna-list">${locRows}</ul>${loc.note?`<div class="char-note">${loc.note}</div>`:''}`},
    {label:t.story_h, body:`${st.structure?`<div class="char-note" style="margin-bottom:8px"><b>${t.story_struct}:</b> ${st.structure}</div>`:''}${stMoves?`<div class="char-note"><b>${t.story_moves}:</b></div><div style="margin:4px 0 10px">${stMoves}</div>`:''}${stTemplates?`<div class="char-note"><b>${t.story_templates}:</b></div><ul class="dna-list">${stTemplates}</ul>`:''}${st.note?`<div class="char-note">${st.note}</div>`:''}`}
  ];
  const layerScroll=`<div class="layer-scroll">${layers.map((l,i)=>`<div class="layer-card" style="background:${layerColors[i%layerColors.length]}"><div class="section-h">${l.label}</div>${l.body}</div>`).join('')}</div>`;

  /* quick-facts snapshot for the hero's middle card, computed from data we already have */
  const big5TopIdx = traits.reduce((best,tr,i)=>((p.big5[tr]&&p.big5[tr].score)||0) > ((p.big5[traits[best]]&&p.big5[traits[best]].score)||0) ? i : best, 0);
  const topMotive = (p.motives&&p.motives[0]) ? (lang==='he'?(p.motives[0].label_he||p.motives[0].id):(p.motives[0].label_en||p.motives[0].id)) : '';
  const layerFacts=[
    {label:t.big5_h, value:t.traits[traits[big5TopIdx]]},
    {label:t.motives_h, value:topMotive},
    {label:t.ennea_h, value:lang==='he'?(en.name_he||''):(en.name_en||'')},
    {label:t.cog_h, value:[cg.convergent_divergent,cg.systemizer_empathizer].filter(Boolean).join(' · ')},
    {label:t.local_h, value:loc.audience||''},
    {label:t.story_h, value:st.structure||''}
  ].filter(f=>f.value);

  /* avatar: a real uploaded photo wins; otherwise a generated portrait once
     it's ready; until then, initials + a text impression as the meantime state */
  let avatarInner, avatarCaptionHTML;
  if(p.photo && p.photo.data){
    avatarInner = `<img src="data:${p.photo.media_type};base64,${p.photo.data}" alt="">`;
    avatarCaptionHTML = p.photo.source==='generated' ? `<div class="avatar-caption"><b>${t.avatar_photo_caption}</b></div>` : '';
  } else {
    const initials=(profileName||'').trim().split(/\s+/).map(w=>w[0]).filter(Boolean).slice(0,2).join('').toUpperCase();
    avatarInner = initials ? `<span class="avatar-initials">${escapeHtml(initials)}</span>` : AVATAR_FALLBACK_SVG;
    avatarCaptionHTML = p.visual_impression ? `<div class="avatar-caption"><b>${t.avatar_caption_lead}</b>${escapeHtml(p.visual_impression)}</div>` : '';
  }

  return `<div class="step active">
    <div class="eyebrow">${t.profile_h}${profileName?` · ${escapeHtml(profileName)}`:''}</div>
    ${approved?'':`<p class="q-sub">${t.profile_sub}</p>`}

    <div class="persona-hero">
      <div class="persona-summary">
        <div class="section-h">${t.summary_h}</div>
        <div class="serif persona-summary-text">${p.summary||''}</div>
      </div>
      <div class="persona-layers">
        <div class="section-h">${t.layers_h}</div>
        <ul class="dna-list">${layerFacts.map(f=>`<li><b>${f.label}:</b> ${f.value}</li>`).join('')}</ul>
      </div>
      <div class="persona-photo">
        <div class="avatar-placeholder">${avatarInner}</div>
        ${avatarCaptionHTML}
      </div>
    </div>

    ${layerScroll}

    <div class="dna-rules-grid">
      <div>
        <div class="section-h">${t.dna_h}</div>
        <ul class="dna-list">${dnaRows}</ul>
        <div style="margin-top:10px">${sigs}</div>
      </div>
      <div>
        <div class="section-h">${t.rules_h}</div>
        <ul class="dna-list rules-list">${rules}</ul>
      </div>
    </div>

    ${gaps}

    ${approved?`<div class="approved-banner">${t.approved}<br><button class="btn" style="background:#fff;color:#000;margin-top:14px" onclick="step=STEP_COMPOSER;render()">${t.to_composer}</button></div>`:`
    <div class="section-h">${t.refine_label}</div>
    <textarea id="refine-ta" style="min-height:90px" placeholder="${t.refine_ph}"></textarea>
    <div class="nav">
      <button class="btn btn-ghost" id="refine-btn">${t.refine_btn}</button>
      <button class="btn btn-accent" id="approve-btn">${t.approve_btn}</button>
    </div>`}
  </div>`;
}

function wireRefine(){
  const rb=document.getElementById('refine-btn');
  const ab=document.getElementById('approve-btn');
  if(rb) rb.addEventListener('click',()=>{
    const note=document.getElementById('refine-ta').value.trim();
    if(!note) return;
    const card=document.getElementById('main-card');
    const t=T();
    card.innerHTML=`<div class="step active loading"><div class="pulse"></div><p id="loading-msg">${t.analyzing[0]}</p></div>`;
    runGeneration(note);
  });
  if(ab) ab.addEventListener('click',saveProfile);
}

async function saveProfile(){
  const t=T();
  approved=true;
  const name=(profileName||'').trim() || ((lang==='en'?'Profile ':'פרופיל ')+(profilesStore.profiles.length+1));
  let entry = activeProfileId ? profilesStore.profiles.find(p=>p.id===activeProfileId) : null;
  if(!entry){
    entry={id:genId()};
    profilesStore.profiles.push(entry);
    activeProfileId=entry.id;
  }
  entry.name=name; entry.country=profileCountry||''; entry.lang=lang;
  entry.profile=profile; entry.savedAt=new Date().toISOString();
  profilesStore.activeId=activeProfileId;
  profileName=name;
  try{
    await persistProfiles();
  }catch(err){
    console.warn('storage failed',err);
    render(); renderProfilePicker();
    const card=document.getElementById('main-card');
    card.insertAdjacentHTML('beforeend',`<div class="gap-note">${t.save_warn}</div>`);
    return;
  }
  clearDraft(); /* the questionnaire's answers now live safely inside the saved profile */
  render(); renderProfilePicker();
}

function escapeHtml(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function postLangToggleHTML(){
  const t=T(), cur=effectivePostLang();
  return `<div class="post-lang-toggle">
    <span class="field-label" style="margin:0">${t.post_lang_label}</span>
    <div class="lang-toggle">
      <button class="${cur==='he'?'active':''}" onclick="setPostLang('he')">עברית</button>
      <button class="${cur==='en'?'active':''}" onclick="setPostLang('en')">English</button>
    </div>
  </div>`;
}

function setPostLang(l){
  if(effectivePostLang()===l) return;
  const prev=postLang;
  postLang=l;
  if(currentPost) rewritePostLang(l, prev);
  else render();
}

/* re-express an already-generated post natively in the new language —
   not a literal translation, same message/hook/structure, native phrasing */
async function rewritePostLang(targetLang, prevLang){
  const t=T();
  const card=document.getElementById('main-card');
  card.innerHTML=`<div class="step active loading"><div class="pulse"></div><p>${targetLang==='he'?'כותבים את הפוסט מחדש בעברית...':'Rewriting the post in English...'}</p></div>`;
  try{
    const content=[{type:'text',text:
      `Here is an existing LinkedIn post with alternative hooks:\n${JSON.stringify(currentPost)}\n\nRe-express this SAME post NATIVELY in ${targetLang==='he'?'Hebrew':'English'} — as if it had been written in ${targetLang==='he'?'Hebrew':'English'} from the start, with real slang, idiom and rhythm a native speaker actually uses. Do NOT do a literal, stiff translation. Keep the exact same message, structure, hook and tone. NEVER use an em dash (—). Same JSON shape: {"post":"...","hooks":["...","..."]}. Output nothing but the JSON, no fences, no preamble.`}];
    currentPost = await callClaude(content, false, 12000);
    savePostHistory();
    render();
  }catch(err){
    console.error('post language rewrite failed:',err);
    postLang=prevLang;
    render();
    document.getElementById('main-card').insertAdjacentHTML('beforeend',
      `<div class="gap-note">${t.err_api}<br><small style="opacity:.7">${escapeHtml((err&&err.message)||'')}</small></div>`);
  }
}

function composerHTML(){
  const t=T();
  return `<div class="step active">
    <div class="eyebrow">Voiceprint</div>
    <h2 class="q-title">${t.composer_h}</h2>
    <p class="q-sub">${t.composer_sub}</p>
    ${postLangToggleHTML()}
    <textarea id="post-input" style="min-height:180px" placeholder="${t.input_ph}">${escapeHtml(postInput)}</textarea>
    <div style="margin-top:10px;display:flex;gap:8px;flex-wrap:wrap">
      <button class="btn btn-ghost" id="rec-btn">${recog?t.rec_stop:t.rec_start}</button>
      <button class="btn btn-ghost" id="ideas-btn">${t.ideas_btn}</button>
    </div>
    <div id="ideas-box"></div>

    <label class="field-label">${t.link_label} <small>· ${t.link_small}</small></label>

    <label class="field-label">${t.img_label} <small>· ${t.img_small}</small></label>
    <label class="upload-box"><input type="file" id="post-img" accept="image/png,image/jpeg,image/webp" multiple>+</label>
    <div class="thumbs">${postImages.map(im=>`<img src="data:${im.media_type};base64,${im.data}">`).join('')}</div>

    <div class="nav">
      <button class="btn btn-ghost" onclick="if(recog)recog.stop();step=QUESTIONS.length+1;render()">${t.back_profile}</button>
      <button class="btn btn-primary" id="gen-btn" ${postInput.trim().length>=20?'':'disabled'} onclick="startPostGen()">${t.gen_post}</button>
