<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Voiceprint · טביעת קול</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;600;700;800;900&family=Heebo:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#FBF9F4;
  --ink:#191A1E;
  --ink-soft:#4A4B52;
  --accent:#0E5B47;      /* deep ink-green */
  --accent-soft:#E4F0EA;
  --amber:#E8A83C;
  --line:#E3E0D6;
  --card:#FFFFFF;
  --danger:#B23A3A;
  --radius:14px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:'Assistant',sans-serif;
  background:var(--paper);
  color:var(--ink);
  line-height:1.55;
  font-size:17px;
}
.serif{font-family:'Frank Ruhl Libre',serif}

/* ---------- layout ---------- */
.app{max-width:1060px;margin:0 auto;padding:28px 20px 80px;display:grid;grid-template-columns:1fr 230px;gap:36px}
[dir="ltr"] .app{grid-template-columns:1fr 230px}
main{min-width:0}
@media(max-width:820px){
  .app{grid-template-columns:1fr;gap:18px}
  aside{order:-1}
}

/* ---------- header ---------- */
header{grid-column:1/-1;display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.logo{display:flex;align-items:baseline;gap:10px}
.logo h1{font-family:'Frank Ruhl Libre',serif;font-weight:900;font-size:1.6rem;letter-spacing:-.01em}
.logo span{color:var(--accent);font-weight:700;font-size:.85rem}
.lang-toggle{display:flex;border:1.5px solid var(--ink);border-radius:999px;overflow:hidden}
.lang-toggle button{border:0;background:transparent;padding:6px 16px;font:inherit;font-weight:700;cursor:pointer;color:var(--ink)}
.lang-toggle button.active{background:var(--ink);color:var(--paper)}

/* ---------- layers sidebar (signature) ---------- */
aside{position:sticky;top:24px;align-self:start}
.layers{border:1.5px solid var(--line);border-radius:var(--radius);background:var(--card);padding:18px}
.layers h3{font-size:.8rem;text-transform:uppercase;letter-spacing:.12em;color:var(--ink-soft);margin-bottom:14px}
.layer{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px dashed var(--line)}
.layer:last-child{border-bottom:0}
.layer .dots{display:flex;gap:4px;margin-inline-start:auto}
.layer .dot{width:8px;height:8px;border-radius:50%;background:var(--line);transition:background .4s,transform .4s}
.layer .dot.on{background:var(--accent);transform:scale(1.15)}
.layer .name{font-weight:600;font-size:.9rem}
@media(max-width:820px){
  aside{position:static}
  .layers{display:flex;gap:12px;overflow-x:auto;padding:12px}
  .layers h3{display:none}
  .layer{flex-direction:column;border-bottom:0;min-width:86px;gap:5px;text-align:center}
  .layer .dots{margin:0}
  .layer .name{font-size:.75rem}
}

/* ---------- cards / steps ---------- */
.card{background:var(--card);border:1.5px solid var(--line);border-radius:var(--radius);padding:34px 36px;box-shadow:0 1px 0 rgba(0,0,0,.02)}
@media(max-width:600px){.card{padding:24px 20px}}
.step{display:none;animation:rise .45s ease}
.step.active{display:block}
@keyframes rise{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
@media(prefers-reduced-motion:reduce){.step{animation:none}}

.eyebrow{font-size:.78rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);margin-bottom:10px}
.q-title{font-family:'Frank Ruhl Libre',serif;font-weight:900;font-size:1.55rem;line-height:1.25;margin-bottom:8px}
.q-sub{color:var(--ink-soft);margin-bottom:22px;font-size:.98rem}
.lang-hint{display:inline-flex;align-items:center;gap:8px;background:var(--accent-soft);color:var(--accent);border-radius:8px;padding:6px 12px;font-size:.88rem;font-weight:600;margin-bottom:18px}

/* options */
.opt{display:block;width:100%;text-align:start;border:1.5px solid var(--line);background:var(--paper);border-radius:10px;padding:14px 16px;margin-bottom:10px;font:inherit;cursor:pointer;transition:border-color .15s,background .15s;position:relative}
.opt:hover{border-color:var(--accent)}
.opt.selected{border-color:var(--accent);background:var(--accent-soft)}
.opt .rank-badge{position:absolute;inset-inline-end:12px;top:12px;width:24px;height:24px;border-radius:50%;background:var(--accent);color:#fff;font-weight:700;font-size:.8rem;display:flex;align-items:center;justify-content:center}

textarea,input[type=text]{
  width:100%;font:inherit;border:1.5px solid var(--line);border-radius:10px;
  padding:14px 16px;background:var(--paper);resize:vertical;min-height:150px;color:var(--ink)
}
textarea:focus,input:focus{outline:2px solid var(--accent);outline-offset:1px;border-color:var(--accent)}
.char-note{font-size:.82rem;color:var(--ink-soft);margin-top:6px}

/* uploads */
.upload-box{border:2px dashed var(--line);border-radius:10px;padding:18px;text-align:center;cursor:pointer;transition:border-color .15s;margin-bottom:8px}
.upload-box:hover{border-color:var(--accent)}
.upload-box input{display:none}
.thumbs{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
.thumbs img{width:64px;height:64px;object-fit:cover;border-radius:8px;border:1.5px solid var(--line)}
.field-label{font-weight:700;margin:22px 0 8px;display:block}
.field-label small{font-weight:400;color:var(--ink-soft)}

/* nav */
.nav{display:flex;justify-content:space-between;align-items:center;margin-top:28px;gap:12px}
.btn{border:0;font:inherit;font-weight:700;border-radius:999px;padding:12px 28px;cursor:pointer;transition:transform .1s}
.btn:active{transform:scale(.98)}
.btn-primary{background:var(--ink);color:var(--paper)}
.btn-primary:disabled{opacity:.35;cursor:not-allowed}
.btn-ghost{background:transparent;color:var(--ink-soft);border:1.5px solid var(--line)}
.btn-accent{background:var(--accent);color:#fff}
.progress-label{font-size:.85rem;color:var(--ink-soft)}

/* intro */
.intro h2{font-family:'Frank Ruhl Libre',serif;font-weight:900;font-size:2.3rem;line-height:1.15;margin-bottom:14px}
.intro p{color:var(--ink-soft);max-width:56ch;margin-bottom:12px}
.intro .start-row{margin-top:26px;display:flex;gap:14px;align-items:center;flex-wrap:wrap}

/* loading */
.loading{text-align:center;padding:60px 20px}
.pulse{width:64px;height:64px;margin:0 auto 22px;border-radius:50%;border:3px solid var(--accent-soft);border-top-color:var(--accent);animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading p{color:var(--ink-soft)}

/* profile view */
.profile-summary{background:var(--accent-soft);border-radius:10px;padding:20px 22px;margin-bottom:24px;font-size:1.05rem}
.trait-row{display:flex;align-items:center;gap:14px;margin-bottom:12px}
.trait-name{width:170px;font-weight:600;font-size:.92rem;flex-shrink:0}
.trait-bar{flex:1;height:10px;background:var(--paper);border:1px solid var(--line);border-radius:99px;overflow:hidden}
.trait-fill{height:100%;background:var(--accent);border-radius:99px;transition:width .8s ease}
.trait-score{width:34px;text-align:center;font-weight:700;font-size:.9rem}
.section-h{font-family:'Frank Ruhl Libre',serif;font-weight:700;font-size:1.15rem;margin:26px 0 12px;padding-bottom:6px;border-bottom:1.5px solid var(--line)}
.chip{display:inline-block;background:var(--paper);border:1.5px solid var(--line);border-radius:999px;padding:5px 14px;margin:0 0 8px;margin-inline-end:8px;font-size:.88rem;font-weight:600}
.chip.hot{border-color:var(--amber);background:#FBF3E2}
.dna-list{list-style:none}
.dna-list li{padding:8px 0;border-bottom:1px dashed var(--line);font-size:.95rem}
.dna-list li:last-child{border:0}
.dna-list b{color:var(--accent)}
.gap-note{background:#FBF3E2;border:1.5px solid var(--amber);border-radius:10px;padding:14px 16px;margin-top:18px;font-size:.92rem}
.error-box{background:#FBE9E9;border:1.5px solid var(--danger);color:var(--danger);border-radius:10px;padding:14px 16px;margin-top:14px;font-size:.92rem}
.approved-banner{background:var(--accent);color:#fff;border-radius:10px;padding:18px 20px;margin-top:20px;font-weight:600}
</style>

body{

}
html[lang="he"] body{font-size:19px}
.serif,.logo h1,.q-title,.section-h,.intro h2{font-family:'Rubik','Heebo',sans-serif;letter-spacing:-.02em}

.serif{font-family:'Frank Ruhl Libre',serif}
.q-title{font-size:1.72rem}
.intro h2{font-size:2.5rem}

}
.btn{border-radius:999px}
.btn-ghost{

}

<script>
/* set theme before paint (no flash); follows saved choice or system preference */
(function(){try{var s=localStorage.getItem('vp_theme');
  var m=s||((window.matchMedia&&matchMedia('(prefers-color-scheme:dark)').matches)?'dark':'light');
  document.documentElement.setAttribute('data-theme',m);}catch(e){document.documentElement.setAttribute('data-theme','light');}})();
function toggleTheme(){var cur=document.documentElement.getAttribute('data-theme')==='dark'?'dark':'light';
  var next=cur==='dark'?'light':'dark';
  document.documentElement.setAttribute('data-theme',next);
  try{localStorage.setItem('vp_theme',next);}catch(e){}}
</script>

/* ---------- state ---------- */
let lang = 'he';
let step = -1; /* -1 = intro */
const answers = {};   /* qid -> value */
let uploads = {posts:'', about:'', images:[]}; /* images: [{media_type,data}] */
let profile = null;
let approved = false;
let apiKey = '';
let postInput='', postLink='', postImages=[], currentPost=null, recog=null, lastRefineNote=null;
const STEP_COMPOSER = QUESTIONS.length+2, STEP_RESULT = QUESTIONS.length+3;

const T = () => I18N[lang];

/* ---------- language ---------- */
function setLang(l){
  lang = l;
  document.documentElement.lang = l;
  document.documentElement.dir = l==='he' ? 'rtl' : 'ltr';
  document.getElementById('btn-he').classList.toggle('active', l==='he');
  document.getElementById('btn-en').classList.toggle('active', l==='en');
  document.getElementById('tagline').textContent = T().tagline;
  renderLayers(); render();
}

/* ---------- sidebar ---------- */
function renderLayers(){
  const filled = {};
  LAYERS.forEach(L=>filled[L.id]=0);
  Object.keys(answers).forEach(qid=>{
    if(!answered(qid)) return;
    (FEEDS[qid]||[]).forEach(id=>filled[id]=(filled[id]||0)+1);
  });
  const el = document.getElementById('layers-panel');
  el.innerHTML = `<h3>${lang==='he'?'שכבות הפרופיל':'Profile layers'}</h3>` +
    LAYERS.map(L=>{
      const n = Math.min(filled[L.id]||0, L.slots);
      let dots='';
      for(let i=0;i<L.slots;i++) dots+=`<span class="dot ${i<n?'on':''}"></span>`;
      return `<div class="layer"><span class="name">${L[lang]}</span><span class="dots">${dots}</span></div>`;
    }).join('');
}

function answered(qid){
  const q = QUESTIONS.find(x=>x.id===qid);
  const v = answers[qid];
  if(!q) return false;
  if(q.type==='open') return v && v.trim().length>=30;
  if(q.type==='single') return !!v;
  if(q.type==='rank') return Array.isArray(v) && v.length===q.max;
  if(q.type==='uploads') return (uploads.posts.trim().length>50)||uploads.images.length>0;
  return false;
}

/* ---------- render ---------- */
function render(){
  const card = document.getElementById('main-card');
  if(step===-1){ card.innerHTML = introHTML(); return; }
  if(step===QUESTIONS.length){ card.innerHTML = generateHTML(); return; }
  if(step===QUESTIONS.length+1){ card.innerHTML = profileHTML(); wireRefine(); return; }
  if(step===STEP_COMPOSER){ card.innerHTML = composerHTML(); wireComposer(); return; }
  if(step===STEP_RESULT){ card.innerHTML = resultHTML(); return; }
  card.innerHTML = questionHTML(QUESTIONS[step]);
  wireQuestion(QUESTIONS[step]);
  renderLayers();
}

function introHTML(){
  const t=T();
  return `<div class="intro step active">
    <h2 class="serif">${t.intro_h}</h2>
    <p>${t.intro_p1}</p>
    <p><b>${t.intro_p2}</b></p>
    <p>${t.intro_p3}</p>
    <div class="start-row">
      <button class="btn btn-primary" onclick="step=0;render()">${t.start} ←</button>
    </div>
  </div>`;
}

function questionHTML(q){
  const t=T(), L=q[lang];
  let body='';
  if(q.type==='open'){
    body = (q.writeLang?`<div class="lang-hint">${t.write_lang_hint}</div>`:'') +
      `<textarea id="ta" placeholder="">${answers[q.id]||''}</textarea>
       <div class="char-note">${t.open_note}</div>`;
  }
  if(q.type==='single'){
    body = q.opts.map(o=>`<button class="opt ${answers[q.id]===o.v?'selected':''}" data-v="${o.v}">${o[lang]}</button>`).join('');
  }
  if(q.type==='rank'){
    const sel = answers[q.id]||[];
    body = `<div class="char-note" style="margin-bottom:12px">${t.rank_note}</div>`+
      q.opts.map(o=>{
        const idx = sel.indexOf(o.v);
        return `<button class="opt ${idx>-1?'selected':''}" data-v="${o.v}">${o[lang]}${idx>-1?`<span class="rank-badge">${idx+1}</span>`:''}</button>`;
      }).join('');
  }
  if(q.type==='uploads'){
    body = `
      <label class="field-label">${t.posts_label} <small>· ${t.posts_small}</small></label>
      <textarea id="posts-ta" placeholder="${t.posts_ph}">${uploads.posts}</textarea>

      <label class="field-label">${t.pic_label} <small>· ${t.pic_small}</small></label>
      <label class="upload-box"><input type="file" id="img-input" accept="image/png,image/jpeg,image/webp" multiple>
        📷 ${t.pic_btn}</label>
      <div class="thumbs" id="thumbs">${uploads.images.map(im=>`<img src="data:${im.media_type};base64,${im.data}">`).join('')}</div>

      <label class="field-label">${t.about_label} <small>· ${t.about_small}</small></label>
      <textarea id="about-ta" style="min-height:90px" placeholder="${t.about_ph}">${uploads.about}</textarea>`;
  }

  const isLast = step===QUESTIONS.length-1;
  return `<div class="step active">
    <div class="eyebrow">${L.ey}</div>
    <h2 class="q-title">${L.t}</h2>
    ${L.s?`<p class="q-sub">${L.s}</p>`:''}
    ${body}
    <div class="nav">
      <button class="btn btn-ghost" onclick="step--;render()">${t.back}</button>

const CODEX = `
You are a personality-profiling engine for a LinkedIn ghostwriting platform. Build a profile from questionnaire answers using these frameworks:

BIG 5 — score each 1-5 using both closed answers AND language markers in free text (open-vocabulary method, Park et al. 2014):
- Extraversion: social words, exclamation marks, emojis, short energetic sentences, calls to action vs. reflective first-person, longer sentences, ellipses.
- Openness: metaphors, abstract/idea words, original syntax, varied topics vs. concrete, practical, routine language.
- Conscientiousness: planning words, structured syntax, standard punctuation vs. "we'll see", topic-jumping, casual flow.
- Agreeableness: warm words (thanks, together, appreciate), soft phrasing, hearts vs. sharp, competitive, blunt language.
- Neuroticism: stress words, multiple !!/..., dramatic phrasing vs. calm, solution-focused, proportionate language.

MOTIVES (score the user's top 3 from their ranking Q3 + free text evidence): achievement, power/influence, recognition, security, belonging/acceptance, meaning/spiritual, thrill/risk, pleasure/hedonism, altruism, material. Motives answer WHY the person acts; traits answer HOW. Flag any contradiction between declared ranking and language evidence.

ENNEAGRAM (from Q2 worldview + corroborating evidence): e1=Perfectionist, e2=Helper, e3=Performer, e4=Individualist, e5=Investigator, e6=Loyalist, e7=Enthusiast, e8=Challenger, e9=Peacemaker. Give type number, name, and the core inner motivation.

COGNITIVE ORIENTATION (mainly from Q6+Q9+posts):
- convergent (one precise solution, data, process) vs divergent (many possibilities, connections, "what if").
- systemizer (how systems work: data, frameworks, SOPs) vs empathizer (how people feel: stories, motives, relationships).

WRITING DNA (from Q1, Q6, and pasted posts — the pasted posts are the STRONGEST signal, weight them most):
- primary language (he/en/mixed), average sentence length, punctuation habits (exclamations? ellipses? dashes?), emoji usage (which/none), hook style, humor type, signature phrases (quote 2-3 verbatim from their text), first/second person habits, how they end posts (question? statement? CTA?).
- Also produce 5 DO rules and 5 DON'T rules for ghostwriting this person. Make them specific and actionable (not generic advice) — grounded in the actual evidence from their answers and posts.

LOCALIZATION — language & culture fit (from writing language, phrasing, cultural references in Q1/Q6/posts/About):
- audience: who they write for and the market/culture they operate in.
- language_mix: primary language and how they blend he/en (loanwords, code-switching, English terms inside Hebrew, etc.).
- cultural_markers: local references, idioms, humor style, sensibilities that fit their audience.
- formality: how formal/informal and how they address the reader (ata/at, plural, first-name energy).
- note: one short line on how to keep a post culturally native to them.

STORYTELLING — how they narrate (from Q1, Q6, Q9 and posts):
- structure: how they build a post (e.g. hook → tension → turn → lesson → close), described from their real patterns.
- signature_moves: 2-3 narrative devices they actually use (personal anecdote, dialogue, a confession, a number that lands, a reversal).
- templates: 2-3 concrete, reusable story templates that fit this person, phrased as a short skeleton they could reuse.
- note: one short line on what makes their storytelling land.

If profile pictures are provided, use profile-image research: positive emotion + single frontal face → conscientiousness/agreeableness/extraversion signals; aesthetic/unconventional composition → openness; no face/low emotion → openness or neuroticism direction. Treat as weak supporting evidence only.

CROSS-CHECKING: actively look for contradictions between closed answers and free-text style (e.g., claims introvert but writes with high-energy social markers). List them in "gaps".

Respond with ONLY valid JSON, no markdown fences, no preamble. Be concise — short phrases, not paragraphs. JSON schema:
{
 "summary": "3-4 sentence portrait in {LANG}, warm, second person",
 "big5": {"openness":{"score":1-5,"evidence":"short"},"conscientiousness":{...},"extraversion":{...},"agreeableness":{...},"neuroticism":{...}},
 "motives": [{"id":"...","label_he":"...","label_en":"...","note":"short"} x3],
 "enneagram": {"type":N,"name_he":"...","name_en":"...","core":"short"},
 "cognitive": {"convergent_divergent":"convergent|divergent|balanced","systemizer_empathizer":"systemizer|empathizer|balanced","note":"short"},
 "writing_dna": {"language":"he|en|mixed","sentence_length":"short","punctuation":"short","emoji":"short","hook_style":"short","humor":"short","signature_phrases":["...","..."],"endings":"short","do":["...","...","...","...","..."],"dont":["...","...","...","...","..."]},
 "localization": {"audience":"short","language_mix":"short","cultural_markers":"short","formality":"short","note":"short"},
 "storytelling": {"structure":"short","signature_moves":["...","..."],"templates":["...","..."],"note":"short"},
 "gaps": ["...( empty array if none )"]
}
All free-text values in {LANG}.`;

function buildUserContent(){
  const qa = QUESTIONS.filter(q=>q.type!=='uploads').map(q=>{
    let a = answers[q.id];
    if(q.type==='single'){const o=q.opts.find(x=>x.v===a);a = a+' — '+(o?o.en:'');}
    if(q.type==='rank'){a = (a||[]).map((v,i)=>`${i+1}. ${v}`).join(' | ');}
    return `Q ${q.id} (${q.en.t}):\n${a}`;
  }).join('\n\n');

  let text = CODEX.replaceAll('{LANG}', lang==='he'?'Hebrew':'English')
    + '\n\n=== QUESTIONNAIRE ANSWERS ===\n' + qa;
  if(uploads.posts.trim()) text += '\n\n=== USER\'S REAL LINKEDIN POSTS (strongest style signal) ===\n'+uploads.posts.trim();
  if(uploads.about.trim()) text += '\n\n=== LINKEDIN ABOUT ===\n'+uploads.about.trim();

  const content=[{type:'text',text}];
  uploads.images.forEach(im=>content.push({type:'image',source:{type:'base64',media_type:im.media_type,data:im.data}}));
  return content;
}

async function callClaude(content, useSearch){
  const headers={'Content-Type':'application/json'};
  const token = window.__getToken ? await window.__getToken() : '';
  if(token) headers['Authorization']='Bearer '+token;
  const response = await fetch('/api/claude',{
    method:'POST',
    headers,
    body:JSON.stringify({
      model:'claude-sonnet-4-6',
      max_tokens:4000,
      messages:[{role:'user',content}],
      ...(useSearch?{tools:[{type:'web_search_20250305',name:'web_search'}]}:{})
    })
  });
  const data = await response.json();
  if(data.error) throw new Error(data.error.message||'API error');
  const txt = (data.content||[]).filter(i=>i.type==='text').map(i=>i.text).join('\n');
  const start = txt.indexOf('{'), end = txt.lastIndexOf('}');
  if(start===-1||end===-1) throw new Error('No JSON in response');
  return JSON.parse(txt.slice(start,end+1));
}

    return `<div class="opt" style="cursor:default">
      <div style="font-size:.78rem;font-weight:700;color:var(--accent);margin-bottom:4px">${cat}</div>
      <div style="font-weight:700;margin-bottom:4px">${escapeHtml(idea.title||'')}</div>
      <div class="char-note" style="margin-bottom:10px">${escapeHtml(idea.angle||'')}</div>
      <button class="btn btn-accent" style="padding:7px 16px;font-size:.85rem" data-idea="${idx}">${t.ideas_use}</button>
    </div>`;
  }).join('');
  box.innerHTML=`<div class="section-h">${t.ideas_h}</div>${cards}`;
  box.querySelectorAll('button[data-idea]').forEach(b=>b.addEventListener('click',()=>useIdea(ideas[+b.dataset.idea])));
}

function useIdea(idea){
  const seed=(idea.title||'')+(idea.angle?' — '+idea.angle:'');
  postInput=seed;
  const ta=document.getElementById('post-input');
  if(ta){ ta.value=seed; ta.focus(); }
  const g=document.getElementById('gen-btn'); if(g) g.disabled=postInput.trim().length<20;
  const box=document.getElementById('ideas-box'); if(box) box.innerHTML='';
  window.scrollTo({top:0,behavior:'smooth'});
}

function buildPostContent(refineNote){
  const dnaLang=(profile&&profile.writing_dna&&profile.writing_dna.language)||'mixed';
  let text=`You are ghostwriting ONE LinkedIn post AS this person. Their full profile (personality + writing DNA):
${JSON.stringify(profile)}

RULES:
- Language: match the writing_dna language (${dnaLang}); but if the raw material below is clearly written in a different language, match the raw material.
- Follow every DO and DON'T in writing_dna literally. Mimic their sentence length, punctuation habits, emoji habits, humor and endings. Reuse their signature phrasing style without quoting old posts.
- First line = a scroll-stopping hook drawn from the most specific, human detail in the material. No clickbait clichés.
- Short paragraphs with breathing room. One idea per post. Specificity beats generality.
- Match content angle to their profile: systemizer → process/insight framing; empathizer → people/story framing; their top motives shape what the post celebrates.
- LOCALIZATION: honor the "localization" fields — keep their language_mix, cultural_markers, formality and audience fit so the post reads natively to them and their market. Never translate their voice into neutral corporate English.
- STORYTELLING: build the post using their "storytelling.structure" and lean on ONE of their "storytelling.templates" where it fits; use their signature_moves naturally (don't force all of them).
- Sound human. Forbidden: corporate buzzwords, "thrilled/excited to share", "game-changer", generic AI cadence. No em dashes unless their DNA shows them.
- End the way THEY end posts (per writing_dna.endings).

RAW MATERIAL (what happened, in their own words):
${postInput}`;
  if(postLink.trim()) text+=`\n\nRELEVANT LINK — read it and weave 1-2 concrete points naturally, no summary dump: ${postLink.trim()}`;
  if(postImages.length) text+=`\n\nThe attached image(s) will be posted with this text. Reference what's in them naturally if it strengthens the post.`;
  if(refineNote&&currentPost) text+=`\n\nPREVIOUS DRAFT:\n${currentPost.post}\n\nUSER FEEDBACK — apply it exactly: ${refineNote}`;
  text+=`\n\nRespond with ONLY valid JSON, no fences: {"post":"the full post with \\n\\n between paragraphs","hooks":["alternative opening line 1","alternative opening line 2"]}`;
  const content=[{type:'text',text}];
  postImages.forEach(im=>content.push({type:'image',source:{type:'base64',media_type:im.media_type,data:im.data}}));
  return content;
}

async function startPostGen(refineNote){
  lastRefineNote=refineNote||null;
  const t=T();
  const card=document.getElementById('main-card');
  let i=0;
  card.innerHTML=`<div class="step active loading"><div class="pulse"></div><p id="loading-msg">${t.writing[0]}</p></div>`;
  clearInterval(loadTimer);
  loadTimer=setInterval(()=>{i=(i+1)%t.writing.length;const el=document.getElementById('loading-msg');if(el)el.textContent=t.writing[i];},2200);
  try{
    currentPost=await callClaude(buildPostContent(refineNote), !!postLink.trim());
    clearInterval(loadTimer);
    savePostHistory();
    step=STEP_RESULT; render();
  }catch(err){
    clearInterval(loadTimer);
    console.error('post gen error:',err);
    card.innerHTML=`<div class="step active">
      <div class="error-box">${t.err_api}<br><small style="opacity:.7">${escapeHtml((err&&err.message)||'')}</small></div>
      ${String(err&&err.message).includes('fetch')?`<div class="gap-note" style="margin-top:12px"><input type="text" id="api-key-input" style="min-height:auto" placeholder="sk-ant-..." value="${escapeHtml(apiKey)}"></div>`:''}
      <div class="nav">
        <button class="btn btn-ghost" onclick="step=STEP_COMPOSER;render()">${t.back}</button>
        <button class="btn btn-primary" onclick="const k=document.getElementById('api-key-input');if(k)apiKey=k.value.trim();startPostGen(lastRefineNote)">${t.retry}</button>
      </div></div>`;
  }
}

function resultHTML(){
  const t=T(), p=currentPost||{post:'',hooks:[]};
  const hooks=(p.hooks||[]).map(h=>`<span class="chip">${escapeHtml(h)}</span>`).join('');
  return `<div class="step active">
    <div class="eyebrow">${t.result_h}</div>
    <div style="background:var(--paper);border:1.5px solid var(--line);border-radius:10px;padding:22px;white-space:pre-wrap;font-size:1.02rem">${escapeHtml(p.post)}</div>
    <div style="margin-top:12px;display:flex;gap:8px;flex-wrap:wrap">
      <button class="btn btn-accent" id="copy-btn" onclick="copyPost()">${t.copy}</button>
      <button class="btn btn-primary" id="li-open-btn" onclick="openLinkedIn()">${t.li_open}</button>
    </div>
    ${hooks?`<div class="section-h">${t.alt_hooks}</div>${hooks}`:''}
    <div class="section-h">${t.refine_post_label}</div>
    <textarea id="post-refine" style="min-height:80px" placeholder="${t.refine_post_ph}"></textarea>
    <div class="nav">
      <button class="btn btn-ghost" onclick="postInput='';postLink='';postImages=[];currentPost=null;step=STEP_COMPOSER;render()">${t.new_post}</button>
      <button class="btn btn-primary" onclick="const n=document.getElementById('post-refine').value.trim();if(n)startPostGen(n)">${t.regen}</button>
    </div>
  </div>`;
}

function copyPost(){
  if(!currentPost) return;
  navigator.clipboard.writeText(currentPost.post).then(()=>{
    const b=document.getElementById('copy-btn');
    if(b){b.textContent=T().copied; setTimeout(()=>{if(b)b.textContent=T().copy;},2000);}
  });
}

/* copy the post, then open LinkedIn's composer in a new tab to paste */
function openLinkedIn(){
  if(!currentPost) return;
  const finish=()=>{
    const b=document.getElementById('li-open-btn');
    if(b){b.textContent=T().li_toast; setTimeout(()=>{if(b)b.textContent=T().li_open;},2500);}
    window.open('https://www.linkedin.com/feed/?shareActive=true','_blank','noopener');
  };
  navigator.clipboard.writeText(currentPost.post).then(finish, finish);
}

async function savePostHistory(){
  try{
    if(!window.storage) return;
    let hist=[];
    try{
      const saved=await window.storage.get('voiceprint_posts');
      if(saved&&saved.value) hist=JSON.parse(saved.value);
    }catch(e){/* first post */}
    hist.push({date:new Date().toISOString(),input:postInput.slice(0,300),post:currentPost.post});
    if(hist.length>20) hist=hist.slice(-20);
    await window.storage.set('voiceprint_posts', JSON.stringify(hist));
  }catch(e){console.warn('post history save failed',e);}
}

/* ---------- boot: load saved profile if exists ---------- */
(async function boot(){
  await window.__authReady;
  renderLayers();
  try{
    if(window.storage){
      const saved=await window.storage.get('voiceprint_profile');
      if(saved&&saved.value){
        const obj=JSON.parse(saved.value);
        profile=obj.profile; lang=obj.lang||'he';
        approved=true; step=QUESTIONS.length+1;
        setLang(lang);
        return;
      }
    }
  }catch(e){/* no saved profile — fresh start */}
  render();
})();
</script>

<script type="module">
/* =========================================================
   AUTH + STORAGE — Supabase (email magic-link login,
   per-user profile + post history). Infrastructure only.
   ========================================================= */
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

/* ---- login screen styles (kept minimal, matches the app look) ---- */
const css = document.createElement('style');
css.textContent = `
#vp-auth{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;padding:24px;z-index:1000}
#vp-auth::before{content:'';position:absolute;inset:0;background:var(--grad);z-index:-1}
#vp-auth .box{max-width:420px;width:100%;background:var(--panel);-webkit-backdrop-filter:blur(var(--blur));backdrop-filter:blur(var(--blur));border:1px solid var(--panel-border);border-radius:var(--radius);padding:34px 32px;text-align:center;box-shadow:var(--shadow)}
#vp-auth h2{font-family:'Frank Ruhl Libre',serif;font-weight:900;font-size:1.7rem;margin-bottom:8px}
#vp-auth p{color:var(--ink-soft);margin-bottom:20px;font-size:.98rem}
#vp-auth input{width:100%;font:inherit;border:1px solid var(--panel-border);border-radius:12px;padding:13px 15px;background:var(--field);color:var(--ink);margin-bottom:12px;min-height:auto}
#vp-auth input:focus{outline:2px solid var(--accent);outline-offset:1px;border-color:var(--accent)}
#vp-auth button{width:100%;border:0;font:inherit;font-weight:700;border-radius:999px;padding:13px;cursor:pointer;background:var(--ink);color:var(--paper)}
#vp-auth button:disabled{opacity:.5;cursor:not-allowed}
#vp-auth .msg{margin-top:14px;font-size:.9rem;color:var(--accent);font-weight:600}
#vp-auth .msg.err{color:var(--danger)}
#vp-logout{border:1.5px solid var(--line);background:transparent;color:var(--ink-soft);font:inherit;font-weight:600;font-size:.82rem;border-radius:999px;padding:6px 14px;cursor:pointer;margin-inline-start:10px}
`;
document.head.appendChild(css);

const t = { title:'Voiceprint', sub:'הכניסי את המייל שלך ונשלח לך קישור כניסה.', ph:'you@example.com',
  btn:'שליחת קישור כניסה', sent:'שלחנו קישור למייל. פתחי אותו כדי להיכנס.',
  err:'משהו השתבש. נסי שוב.', bad:'כתובת מייל לא תקינה.',
  noconf:'החיבור לשרת עדיין לא הוגדר. ראי את קובץ ההוראות (README).', logout:'יציאה' };

const overlay = document.createElement('div');
overlay.id = 'vp-auth';
overlay.innerHTML = `
  <div class="box">
    <h2 class="serif">${t.title}</h2>
    <p>${t.sub}</p>
    <input id="vp-email" type="email" dir="ltr" placeholder="${t.ph}" autocomplete="email">
    <button id="vp-send">${t.btn}</button>
    <div class="msg" id="vp-msg" style="display:none"></div>
  </div>`;
document.body.appendChild(overlay);

function showMsg(text, isErr){
  const m = document.getElementById('vp-msg');
  m.textContent = text; m.style.display='block';
  m.className = 'msg' + (isErr ? ' err' : '');
}

/* ---- connect to Supabase using public config from the server ---- */
let supabase = null;
try {
  const cfg = await (await fetch('/api/config')).json();
  if (!cfg.supabaseUrl || !cfg.supabaseAnonKey) throw new Error('missing config');
  supabase = createClient(cfg.supabaseUrl, cfg.supabaseAnonKey);
} catch (e) {
  showMsg(t.noconf, true);
}

/* ---- storage backed by Supabase — same interface the app expects ---- */
window.storage = {
  async get(key){
    const { data, error } = await supabase.from('kv_store').select('value').eq('key', key).maybeSingle();
    if (error) throw error;
    return data ? { value: data.value } : null;
  },
  async set(key, value){
    const { data:{ user } } = await supabase.auth.getUser();
    const { error } = await supabase.from('kv_store').upsert({ user_id: user.id, key, value }, { onConflict: 'user_id,key' });
    if (error) throw error;
  }
};
window.__getToken = async () => {
  if (!supabase) return '';
  const { data:{ session } } = await supabase.auth.getSession();
  return session ? session.access_token : '';
};

const sendBtn = document.getElementById('vp-send');
const emailInput = document.getElementById('vp-email');
sendBtn.addEventListener('click', async () => {
  const email = (emailInput.value||'').trim();
  if (!email || !email.includes('@')) { showMsg(t.bad, true); return; }
  if (!supabase) { showMsg(t.noconf, true); return; }
  sendBtn.disabled = true;
  try {
    const { error } = await supabase.auth.signInWithOtp({ email, options:{ emailRedirectTo: window.location.origin } });
    if (error) throw error;
    showMsg(t.sent, false);
  } catch(e){ showMsg(t.err, true); sendBtn.disabled = false; }
});
emailInput.addEventListener('keydown', e => { if (e.key === 'Enter') sendBtn.click(); });

let done = false;
function onAuthed(){
  if (done) return; done = true;
  overlay.remove();
  const toggle = document.querySelector('.lang-toggle');
  if (toggle && !document.getElementById('vp-logout')) {
    const btn = document.createElement('button');
    btn.id = 'vp-logout'; btn.textContent = t.logout;
    btn.addEventListener('click', async () => { await supabase.auth.signOut(); location.reload(); });
    toggle.parentNode.insertBefore(btn, toggle.nextSibling);
  }
  window.__resolveAuth();
}

if (supabase) {
  const { data:{ session } } = await supabase.auth.getSession();
  if (session) onAuthed();
  supabase.auth.onAuthStateChange((_e, s) => { if (s) onAuthed(); });
}
</script>
</body>
</html>
