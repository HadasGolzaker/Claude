<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Voiceprint · טביעת קול</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Arimo:wght@400;500;600;700&family=Noto+Serif:wght@600;700;800&family=Noto+Serif+Hebrew:wght@600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#FAFAFA;
  --ink:#000000;
  --ink-soft:#000000;
  --accent:#E4C4E1;      /* soft lavender — primary accent */
  --accent-soft:#F4E9F3;
  --amber:#B5793A;
  --line:#DEDCD0;
  --card:#FAFAFA;
  --danger:#B23A3A;
  --radius:16px;
  --font-serif:'Noto Serif Hebrew','Noto Serif',serif;
  --font-sans:'Arimo',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:var(--font-sans);
  background:var(--paper);
  color:var(--ink);
  line-height:1.55;
  font-size:17px;
}
.serif{font-family:var(--font-serif)}

/* ---------- layout ---------- */
.app{max-width:1500px;margin:0 auto;padding:28px 20px 80px;display:grid;grid-template-columns:1fr 230px;gap:36px}
[dir="ltr"] .app{grid-template-columns:1fr 230px}
.app.no-aside,[dir="ltr"] .app.no-aside{grid-template-columns:1fr}
.app.no-aside aside{display:none}
main{min-width:0}
@media(max-width:820px){
  .app,[dir="ltr"] .app{grid-template-columns:1fr;gap:18px}
  aside{order:-1}
  header{flex-wrap:wrap}
  .header-controls{flex-wrap:wrap;justify-content:flex-end}
}

/* ---------- header ---------- */
header{grid-column:1/-1;display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;gap:12px;direction:ltr}
header .logo,header .header-controls{direction:ltr}
.logo{display:flex;align-items:baseline;gap:10px;min-width:0}
.logo h1{font-family:var(--font-serif);font-weight:700;font-size:1.6rem;letter-spacing:-.01em;flex-shrink:0}
.logo span{color:var(--ink);font-weight:700;font-size:.85rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.lang-toggle{display:flex;border:1.5px solid var(--ink);border-radius:999px;overflow:hidden}
.lang-toggle button{border:0;background:transparent;padding:6px 16px;font:inherit;font-weight:700;cursor:pointer;color:var(--ink)}
.lang-toggle button.active{background:var(--ink);color:var(--paper)}
.post-lang-toggle{display:flex;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap}

/* ---------- layers sidebar (signature) ---------- */
aside{position:sticky;top:24px;align-self:start}
.layers{border:1.5px solid var(--line);border-radius:var(--radius);background:var(--card);padding:18px}
.layers h3{font-size:.8rem;text-transform:uppercase;letter-spacing:.12em;color:var(--ink-soft);margin-bottom:14px}
.layer{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px dashed var(--line)}
.layer:last-child{border-bottom:0}
.layer .dots{display:flex;gap:4px;margin-inline-start:auto}
.layer .dot{width:8px;height:8px;border-radius:50%;background:var(--line);transition:background .4s,transform .4s}
.layer .dot.on{background:var(--accent);transform:scale(1.15)}
.layer .name{font-weight:600;font-size:.9rem}
@media(max-width:820px){
  aside{position:static;min-width:0}
  .layers{display:flex;gap:12px;overflow-x:auto;padding:12px;min-width:0}
  .layers h3{display:none}
  .layer{flex-direction:column;border-bottom:0;min-width:86px;flex:0 0 auto;gap:5px;text-align:center}
  .layer .dots{margin:0}
  .layer .name{font-size:.75rem}
}

/* ---------- cards / steps ---------- */
.card{background:var(--card);border:1.5px solid var(--line);border-radius:var(--radius);padding:34px 36px;box-shadow:0 1px 0 rgba(0,0,0,.02)}
@media(max-width:600px){.card{padding:24px 20px}}
.step{display:none;animation:rise .45s ease}
.step.active{display:block}
@keyframes rise{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
@media(prefers-reduced-motion:reduce){.step{animation:none}}

.eyebrow{font-size:.78rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--ink);margin-bottom:10px}
.q-title{font-family:var(--font-serif);font-weight:600;font-size:1.55rem;line-height:1.25;margin-bottom:8px}
.q-sub{color:var(--ink-soft);margin-bottom:22px;font-size:.98rem}
.lang-hint{display:inline-flex;align-items:center;gap:8px;background:var(--lavender-soft);color:var(--ink);border-radius:8px;padding:6px 12px;font-size:.88rem;font-weight:600;margin-bottom:18px}

/* options */
.opt{display:block;width:100%;text-align:start;border:1.5px solid var(--line);background:var(--paper);color:var(--ink);border-radius:10px;padding:14px 16px;margin-bottom:10px;font:inherit;cursor:pointer;transition:border-color .15s,background .15s;position:relative}
.opt:hover{background:var(--hover-fill)}
.opt.selected{border-color:var(--accent);background:var(--accent);color:#000;font-weight:600}
.opt.selected:hover{background:var(--accent)}
.opt .rank-badge{position:absolute;inset-inline-end:12px;top:12px;width:24px;height:24px;border-radius:50%;background:var(--lavender);color:#000;font-weight:700;font-size:.8rem;display:flex;align-items:center;justify-content:center}

textarea,input[type=text]{
  width:100%;font:inherit;border:1.5px solid var(--line);border-radius:10px;
  padding:14px 16px;background:var(--paper);resize:vertical;min-height:150px;color:var(--ink)
}
textarea:focus,input:focus{outline:2px solid var(--accent);outline-offset:1px;border-color:var(--accent)}
.char-note{font-size:.82rem;color:var(--ink-soft);margin-top:6px}

/* uploads */
.upload-box{border:2px dashed var(--line);border-radius:10px;padding:18px;text-align:center;cursor:pointer;transition:border-color .15s;margin-bottom:8px}
.upload-box:hover{border-color:var(--accent)}
.upload-box input{display:none}
.thumbs{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
.thumbs img{width:64px;height:64px;object-fit:cover;border-radius:8px;border:1.5px solid var(--line)}
.field-label{font-weight:700;margin:22px 0 8px;display:block}
.field-label small{font-weight:400;color:var(--ink-soft)}

/* nav */
.nav{display:flex;justify-content:space-between;align-items:center;margin-top:28px;gap:18px}
.btn{border:0;font:inherit;font-weight:700;border-radius:999px;padding:12px 28px;cursor:pointer;transition:transform .1s}
.btn:active{transform:scale(.98)}
.btn-primary{background:var(--ink);color:var(--paper)}
.btn-primary:disabled{opacity:.35;cursor:not-allowed}
.btn-ghost{background:transparent;color:var(--ink-soft);border:1.5px solid var(--line)}
.btn-accent{background:var(--accent);color:#000}
.progress-label{font-size:.85rem;color:var(--ink-soft)}

/* intro */
.intro h2{font-family:var(--font-serif);font-weight:700;font-size:2.3rem;line-height:1.15;margin-bottom:14px}
.intro p{color:var(--ink-soft);max-width:56ch;margin-bottom:12px}
.intro .start-row{margin-top:26px;display:flex;gap:14px;align-items:center;flex-wrap:wrap}

/* loading */
.loading{text-align:center;padding:60px 20px}
.pulse{width:64px;height:64px;margin:0 auto 22px;border-radius:50%;border:3px solid var(--accent-soft);border-top-color:var(--accent);animation:spin 1s linear infinite}
.loading-preview{max-width:52ch;margin:16px auto 0;font-size:.95rem;line-height:1.55;color:var(--ink);text-align:start;min-height:1.5em}
@keyframes spin{to{transform:rotate(360deg)}}
.loading p{color:var(--ink-soft)}

/* profile view — persona hero (photo · quick facts · summary) */
.persona-hero{display:grid;grid-template-columns:1fr 1.3fr 1.3fr;gap:16px;margin-bottom:26px;align-items:stretch}
@media(max-width:820px){.persona-hero{grid-template-columns:1fr}}
.persona-photo,.persona-layers{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:20px}
.persona-photo{display:flex;flex-direction:column;align-items:center;text-align:center;gap:14px;justify-content:center}
.avatar-placeholder{width:104px;height:104px;border-radius:50%;background:var(--accent-soft);display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden}
.avatar-placeholder img{width:100%;height:100%;object-fit:cover}
.avatar-initials{font-family:var(--font-serif);font-weight:700;font-size:2rem;color:var(--ink)}
.avatar-placeholder svg{width:52px;height:52px;color:var(--ink)}
.avatar-caption{font-size:.9rem;color:var(--ink-soft);line-height:1.5}
.avatar-caption b{display:block;margin-bottom:4px;color:var(--ink);font-weight:600}
.persona-layers .section-h{margin-top:0}
.persona-summary{background:var(--ink);color:var(--bg);border-radius:var(--radius);padding:22px;display:flex;flex-direction:column;justify-content:center}
.persona-summary .section-h{color:var(--bg);border-bottom-color:rgba(128,128,128,.35);margin-top:0}
.persona-summary-text{font-size:1.08rem;line-height:1.6}

/* horizontal-scroll model-layer cards */
.layer-scroll{display:flex;gap:14px;overflow-x:auto;padding:6px 0 14px;margin-bottom:12px;scroll-snap-type:x proximity;-webkit-overflow-scrolling:touch}
.layer-card{flex:0 0 auto;width:78%;max-width:300px;border-radius:var(--radius);padding:18px 20px;scroll-snap-align:start;color:#000}
.layer-card .section-h{margin:0 0 12px;border:0;padding:0;color:#000}
.layer-card .trait-name{width:88px;font-size:.82rem}
.layer-card .trait-score{width:22px;font-size:.82rem}
.layer-card .char-note{color:#000;opacity:.72}
.layer-card .chip,.layer-card .chip-block{background:rgba(255,255,255,.55);border-color:rgba(0,0,0,.15)}
.layer-card .dna-list li{border-bottom-color:rgba(0,0,0,.18)}
@media(min-width:600px){.layer-card{width:280px}}

/* writing DNA + writing rules, two columns */
.dna-rules-grid{display:grid;grid-template-columns:1fr 1fr;gap:28px;margin-top:8px}
@media(max-width:700px){.dna-rules-grid{grid-template-columns:1fr;gap:6px}}
.rules-list li{border-inline-start:3px solid var(--line);padding-inline-start:12px;border-bottom:0;margin-bottom:8px}
.rules-list li.rule-do{border-inline-start-color:var(--olive)}
.rules-list li.rule-dont{border-inline-start-color:var(--ink)}

.trait-row{display:flex;align-items:center;gap:14px;margin-bottom:12px}
.trait-name{width:170px;font-weight:600;font-size:.92rem;flex-shrink:0}
.trait-bar{flex:1;height:10px;background:var(--paper);border:1px solid var(--line);border-radius:99px;overflow:hidden}
.trait-fill{height:100%;background:var(--accent);border-radius:99px;transition:width .8s ease}
.trait-score{width:34px;text-align:center;font-weight:700;font-size:.9rem}
.section-h{font-family:var(--font-serif);font-weight:600;font-size:1.15rem;margin:26px 0 12px;padding-bottom:6px;border-bottom:1.5px solid var(--line)}
.chip{display:inline-block;background:var(--paper);border:1.5px solid var(--line);border-radius:999px;padding:5px 14px;margin:0 0 8px;margin-inline-end:8px;font-size:.88rem;font-weight:600}
.chip-block{display:block;border-radius:16px;padding:14px 18px;margin:0 0 10px;line-height:1.45}
.chip.hot{border-color:var(--amber);background:#FBF3E2}
.dna-list{list-style:none}
.dna-list li{padding:8px 0;border-bottom:1px dashed var(--line);font-size:.95rem}
.dna-list li:last-child{border:0}
.dna-list b{color:var(--ink)}
.gap-note{background:#FBF3E2;border:1.5px solid var(--amber);border-radius:10px;padding:14px 16px;margin-top:18px;font-size:.92rem}
.error-box{background:#FBE9E9;border:1.5px solid var(--danger);color:var(--danger);border-radius:10px;padding:14px 16px;margin-top:14px;font-size:.92rem}
.approved-banner{background:var(--accent);color:#000;border-radius:10px;padding:18px 20px;margin-top:20px;font-weight:600}
</style>

<style>
/* ==========================================================
   OPPO BRAND PASS — clean, flat, minimal (overrides above)
   ========================================================== */
:root{
  --radius:16px;
  --bg:#F2F1E8;
  --paper:#FAFAFA;
  --card:#FAFAFA;
  --ink:#000000;
  --ink-soft:#000000;
  --line:#DEDCD0;
  --accent:#E4C4E1;        /* soft lavender — primary accent */
  --accent-soft:#F4E9F3;
  --amber:#B5793A;
  --amber-soft:#FEDCC6;    /* peach */
  --danger:#B23A3A;
  --danger-soft:#FBE9E9;
  --lavender:#E4C4E1;
  --lavender-soft:#F4E9F3;
  --olive:#C3C986;
  --olive-soft:#F0F1E1;
  --peach:#FEDCC6;
  --shadow:0 1px 0 rgba(0,0,0,.03);
  --hover-fill:#EEEDE3;
  --g-blue:#E4C4E1;
  --g-orange:#FF6000;
  --g-pink:#FEDCC6;
  --g-green:#C3C986;
  --g-lime:#D8DC9E;
  --on-primary:#000000;
}
:root[data-theme="dark"]{
  --bg:#000000;
  --paper:#0D0D0C;
  --card:#000000;
  --ink:#FFFFFF;
  --ink-soft:#FFFFFF;
  --line:rgba(255,255,255,.16);
  --accent:#E4C4E1;
  --accent-soft:rgba(228,196,225,.24);
  --amber:#E4B27C;
  --amber-soft:rgba(254,220,198,.26);
  --danger:#E27878;
  --danger-soft:rgba(178,58,58,.20);
  --lavender:#E4C4E1;
  --lavender-soft:rgba(228,196,225,.26);
  --olive:#C3C986;
  --olive-soft:rgba(195,201,134,.26);
  --peach:#FEDCC6;
  --shadow:0 1px 0 rgba(0,0,0,.4);
  --hover-fill:rgba(255,255,255,.08);
  --g-lime:#F5E14C;
}
html[lang="en"]{--font-serif:'Noto Serif','Noto Serif Hebrew',serif}
body{
  font-family:var(--font-sans);
  font-size:18px;line-height:1.62;
  background:var(--bg);color:var(--ink);
  font-weight:400;
}
.serif,.logo h1,.q-title,.section-h,.intro h2{font-family:var(--font-serif)}
.intro h2{line-height:1.08}
html[lang="en"] .logo h1{font-size:2rem}
html[lang="en"] .q-title{font-size:2rem;line-height:1.15}
html[lang="en"] .intro h2{font-size:3rem;line-height:1.05}
html[lang="en"] .section-h{font-size:1.4rem}
.q-title{font-size:1.75rem;font-weight:600}
.intro h2{font-size:2.6rem;font-weight:700}
/* larger, readable type (body min 18px, titles min 21px) */
.q-sub,.char-note,.dna-list li,.idea-angle,.opt,.field-label{font-size:1rem}
.idea-title{font-size:1.05rem;font-weight:600}
.chip{font-size:.92rem;font-weight:500}
.section-h{font-size:1.22rem;font-weight:600}
.eyebrow{font-weight:600;font-size:.75rem}
/* Hebrew tuning across all stages */
html[lang="he"] body{font-size:18px;line-height:1.7}
html[lang="he"] .intro h2{font-size:2.3rem;line-height:1.2}
html[lang="he"] .q-title{font-size:1.7rem;line-height:1.35}
html[lang="he"] .section-h{font-size:1.3rem}
html[lang="he"] .q-sub,html[lang="he"] .char-note,html[lang="he"] .dna-list li{font-size:1.02rem}
html[lang="en"] body{font-size:17px}

/* ---------- flat cards & surfaces ---------- */
.card{
  background:var(--card);
  border:1px solid var(--line);border-radius:var(--radius);
  box-shadow:var(--shadow);
}
.layers{
  background:var(--card);
  border:1px solid var(--line);border-radius:var(--radius);
  box-shadow:var(--shadow);
}
.opt{
  background:var(--paper);
  border:1.5px solid var(--line);border-radius:14px;
}
.opt:hover{background:var(--hover-fill)}
.opt.selected{background:var(--accent);border-color:var(--accent);color:#000;font-weight:600}
.opt.selected:hover{background:var(--accent)}
textarea,input[type=text]{
  background:var(--paper);
  border:1.5px solid var(--line);border-radius:12px;color:var(--ink);
}

/* ---------- buttons: black primary pill, outline secondary, grey hover ---------- */
.btn{border-radius:999px;font-weight:600}
.btn-primary{background:var(--ink);color:var(--bg)}
.btn-primary:hover{opacity:.88}
.btn-primary:disabled{opacity:.35}
.btn-ghost{
  background:transparent;
  border:1.5px solid var(--ink);color:var(--ink);
}
.btn-ghost:hover{background:var(--hover-fill)}
.btn-accent{background:var(--accent);color:#000}
.btn-accent:hover{filter:brightness(1.06)}
.chip{
  background:var(--paper);
  border:1.5px solid var(--line);
}
.chip.hot{background:var(--peach);border-color:var(--peach)}
.upload-box{background:var(--paper);border:2px dashed var(--line);border-radius:14px}
.upload-box:hover{border-color:var(--accent)}
.lang-toggle{border-color:var(--ink)}
.gap-note{background:var(--amber-soft);border-color:var(--amber);color:var(--ink)}
.error-box{background:var(--danger-soft);border-color:var(--danger);color:var(--danger)}
:root[data-theme="dark"] .error-box{background:var(--danger-soft);color:var(--danger)}

.trait-fill{background:var(--accent)}
.approved-banner{background:var(--accent);color:#000}
.logo span{color:var(--ink)}

/* brainstorm idea pills — brand palette per category */
.idea-pills{display:flex;flex-direction:column;gap:10px;margin-top:8px}
.idea-pill{border-radius:16px;overflow:hidden;box-shadow:0 2px 10px rgba(0,0,0,.06);animation:ideaIn .5s cubic-bezier(.2,.7,.2,1) both}
.idea-head{width:100%;text-align:start;border:0;cursor:pointer;background:var(--pg);color:#000;font:inherit;padding:14px 18px;display:flex;flex-direction:column;gap:2px}
.idea-cat{font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;opacity:.66}
.idea-title{font-weight:600;font-size:1.02rem;line-height:1.25}
.idea-body{max-height:0;overflow:hidden;background:var(--card);transition:max-height .35s ease,padding .35s ease;padding:0 18px}
/* generous enough for angle + personal-angle textarea + both action buttons —
   a fixed max-height just needs to clear the tallest real content, not match it */
.idea-pill.open .idea-body{max-height:560px;padding:16px 18px}
.idea-angle{margin-bottom:14px;color:var(--ink)}
@keyframes ideaIn{from{opacity:0;transform:translateY(14px) scale(.98)}to{opacity:1;transform:none}}
@media(prefers-reduced-motion:reduce){.idea-pill{animation:none}}
/* brainstorm setup panel */
.ideas-setup{border:1.5px solid var(--line);border-radius:14px;padding:16px;margin-top:10px;background:var(--paper)}
.cat-checks{display:flex;flex-wrap:wrap;gap:8px 16px;margin:8px 0 4px}
.cat-check{display:flex;align-items:center;gap:6px;font-weight:600;font-size:.9rem;cursor:pointer}
.cat-check input{width:16px;height:16px;accent-color:var(--accent);cursor:pointer}
.idea-personal{margin-top:12px;padding-top:12px;border-top:1px dashed var(--line)}
.idea-personal textarea{margin-top:6px;max-height:140px}

/* header controls + theme toggle */
.header-controls{display:flex;gap:12px;align-items:center;flex-shrink:0}
/* user menu (history / profiles / delete / logout / language / theme) */
.user-menu-wrap{position:relative}
.user-menu-panel{position:absolute;top:calc(100% + 8px);inset-inline-end:0;z-index:30;min-width:220px;background:var(--card);border:1.5px solid var(--line);border-radius:12px;box-shadow:var(--shadow);padding:6px;text-align:start}
.user-menu-panel[hidden]{display:none}
.user-menu-label{padding:8px 12px 4px;font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;opacity:.6}
.user-menu-item{display:block;width:100%;text-align:start;border:0;background:transparent;color:var(--ink);font:inherit;font-size:.92rem;padding:10px 12px;border-radius:8px;cursor:pointer}
.user-menu-item:hover{background:var(--hover-fill)}
.user-menu-item.active{font-weight:700}
.user-menu-item.danger{color:var(--danger)}
.profile-row{display:flex;align-items:center;gap:2px}
.profile-row .user-menu-item{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.profile-del-btn{flex-shrink:0;display:flex;align-items:center;justify-content:center;width:30px;height:30px;border:0;background:transparent;color:var(--ink-soft);border-radius:8px;cursor:pointer}
.profile-del-btn:hover{background:var(--hover-fill);color:var(--danger)}
.profile-del-btn svg{width:16px;height:16px}
.user-menu-divider{height:1px;background:var(--line);margin:6px 4px}
.user-menu-segment{display:flex;border:1.5px solid var(--line);border-radius:999px;overflow:hidden;margin:0 4px 8px}
.user-menu-segment button{flex:1;border:0;background:transparent;padding:7px 10px;font:inherit;font-weight:700;font-size:.85rem;cursor:pointer;color:var(--ink)}
.user-menu-segment button.active{background:var(--ink);color:var(--paper)}
/* logout button lives in the user menu now; the auth module still creates
   #vp-logout and wires the real sign-out click (and injects its own visible
   styling for it later at runtime) — !important keeps it invisible regardless */
#vp-logout{display:none!important}
/* delete-profile confirmation */
.btn-danger{background:var(--danger);color:#fff}
.btn-danger:disabled{opacity:.35;cursor:not-allowed}
#vp-del{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;padding:24px;z-index:1200}
#vp-del .box{max-width:440px;width:100%;background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:34px 32px;text-align:center;box-shadow:var(--shadow)}
#vp-del h2{font-family:var(--font-serif);font-weight:600;font-size:1.7rem;margin-bottom:10px}
#vp-del p{margin-bottom:14px}
#vp-del .del-type{font-weight:700;margin-bottom:8px}
#vp-del input{width:100%;font:inherit;font-weight:700;letter-spacing:.12em;text-align:center;direction:ltr;border:1.5px solid var(--line);border-radius:12px;padding:12px 14px;background:var(--paper);color:var(--ink);min-height:auto}
#vp-del input:focus{outline:2px solid var(--danger);outline-offset:1px;border-color:var(--danger)}
#vp-del .row{display:flex;gap:12px;justify-content:center;margin-top:20px}
/* intro name/country fields */
.intro-fields{margin-top:24px;max-width:440px}
.intro-fields input,.intro-fields select{width:100%;font:inherit;border:1.5px solid var(--line);border-radius:12px;padding:12px 14px;background:var(--paper);color:var(--ink);min-height:auto;margin-bottom:4px;resize:none}
.intro-fields select:focus{outline:2px solid var(--accent);outline-offset:1px;border-color:var(--accent)}
.intro-fields .field-label{margin:14px 0 8px}
/* searchable country combobox */
.combo{position:relative}
.combo-list{position:absolute;top:calc(100% + 4px);inset-inline:0;z-index:20;max-height:240px;overflow-y:auto;background:var(--card);border:1.5px solid var(--line);border-radius:12px;box-shadow:var(--shadow);padding:4px}
.combo-list[hidden]{display:none}
.combo-opt{padding:10px 12px;border-radius:8px;cursor:pointer;font-size:.98rem}
.combo-opt:hover,.combo-opt.active{background:var(--accent);color:#000}
.combo-empty{padding:10px 12px;color:var(--ink-soft);font-size:.92rem}
/* Q3 drag-and-drop ranking */
.rank-wrap{display:flex;flex-direction:column;gap:18px;margin-bottom:8px}
.rank-cap{font-size:.85rem;font-weight:700;margin-bottom:8px}
.rank-slots{display:flex;flex-direction:column;gap:10px}
.rank-slot{display:flex;align-items:center;gap:12px;border:1.5px dashed var(--line);border-radius:12px;padding:8px 12px;min-height:58px;transition:border-color .15s,background .15s}
.rank-slot.filled{border-style:solid;border-color:var(--accent)}
.rank-slot.over{border-color:var(--accent);border-style:solid;background:var(--accent-soft)}
.slot-num{width:30px;height:30px;flex-shrink:0;border-radius:50%;background:var(--ink);color:var(--bg);font-weight:700;display:flex;align-items:center;justify-content:center;font-size:.92rem}
.slot-empty{color:var(--ink-soft);font-size:.9rem;opacity:.7}
.rank-pool{display:flex;flex-wrap:wrap;gap:8px;min-height:44px;border:1.5px dashed transparent;border-radius:12px;padding:6px;transition:border-color .15s,background .15s}
.rank-pool.over{border-color:var(--accent);background:var(--accent-soft)}
.rank-pool.pool-done{opacity:.55}
.rank-chip{border:1.5px solid var(--line);background:var(--paper);color:var(--ink);border-radius:999px;padding:9px 15px;font:inherit;font-weight:600;font-size:.92rem;cursor:grab;user-select:none;text-align:start;touch-action:none}
.rank-chip:hover{background:var(--hover-fill)}
.rank-chip.in-slot{flex:1;background:var(--accent);border-color:var(--accent);color:#000;border-radius:10px}
.rank-chip.in-slot:hover{background:var(--accent)}
.rank-chip.drag-source{opacity:.35}
.rank-ghost{border:1.5px solid var(--accent);background:var(--accent);color:#000;border-radius:10px;padding:9px 15px;font-weight:600;font-size:.92rem;box-shadow:0 10px 30px rgba(0,0,0,.35);opacity:.95;cursor:grabbing;display:flex;align-items:center}
/* Q10 no-LinkedIn toggle */
.no-li-toggle{display:flex;align-items:center;gap:9px;font-weight:600;font-size:.95rem;cursor:pointer;margin-bottom:18px;padding:12px 14px;border:1.5px solid var(--line);border-radius:12px;background:var(--paper)}
.no-li-toggle input{width:18px;height:18px;accent-color:var(--accent);cursor:pointer}
.theme-toggle{width:40px;height:40px;border-radius:999px;border:1.5px solid var(--ink);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--ink);padding:0}
.theme-toggle:hover{background:var(--hover-fill)}
.theme-toggle svg{width:18px;height:18px}
.theme-toggle .sun{display:none}
:root[data-theme="dark"] .theme-toggle .moon{display:none}
:root[data-theme="dark"] .theme-toggle .sun{display:block}

(function(){try{var s=localStorage.getItem('vp_theme');
  var m=s||((window.matchMedia&&matchMedia('(prefers-color-scheme:dark)').matches)?'dark':'light');
  document.documentElement.setAttribute('data-theme',m);}catch(e){document.documentElement.setAttribute('data-theme','light');}})();
function setTheme(mode){
  document.documentElement.setAttribute('data-theme',mode);
  try{localStorage.setItem('vp_theme',mode);}catch(e){}
  if(typeof renderProfilePicker==='function') renderProfilePicker(); /* refresh the menu's active state */
}
function toggleTheme(){var cur=document.documentElement.getAttribute('data-theme')==='dark'?'dark':'light';
  setTheme(cur==='dark'?'light':'dark');}

function closeUserMenu(){
  const panel=document.getElementById('user-menu-panel');
  const btn=document.getElementById('user-menu-btn');
  if(panel) panel.hidden=true;
  if(btn) btn.setAttribute('aria-expanded','false');
}

function wireUserMenu(){
  const btn=document.getElementById('user-menu-btn');
  const panel=document.getElementById('user-menu-panel');
  if(!btn||!panel) return;
  btn.addEventListener('click',e=>{
    e.stopPropagation();
    const willOpen=panel.hidden;
    panel.hidden=!willOpen;
    btn.setAttribute('aria-expanded', willOpen?'true':'false');
  });
  /* delegated: panel content is rebuilt by renderProfilePicker(), so a single
     listener on the (stable) panel element covers every rebuild */
  panel.addEventListener('click',e=>{
    const item=e.target.closest('[data-action]');
    if(!item) return;
    closeUserMenu();
    switch(item.dataset.action){
      case 'history': preMenuStep=step; step=STEP_HISTORY; render(); break;
      case 'switch': switchProfile(item.dataset.id); break;
      case 'new-profile': startNewProfile(); break;
      case 'delete-profile': openDeleteModal(item.dataset.id); break;
      case 'set-lang': setLang(item.dataset.lang); break;
      case 'set-theme': setTheme(item.dataset.mode); break;
      case 'logout': { const b=document.getElementById('vp-logout'); if(b) b.click(); break; }
    }
  });
  document.addEventListener('click',e=>{
    if(!panel.hidden && !e.target.closest('.user-menu-wrap')) closeUserMenu();
  });
}

/* ---------- delete profile (bin icon -> type-DELETE confirmation) ---------- */
function openDeleteModal(id){
  const t=T();
  const entry=profilesStore.profiles.find(p=>p.id===id);
  if(!entry) return;
  const ov=document.createElement('div');
  ov.id='vp-del';
  ov.innerHTML=`<div class="box">
    <h2>${t.del_title}</h2>
    <p>${t.del_warn.replace('{name}','<b>'+escapeHtml(entry.name)+'</b>')}</p>
    <p class="del-type">${t.del_type}</p>
    <input id="vp-del-input" type="text" autocomplete="off" spellcheck="false" placeholder="DELETE">
    <div class="row">
      <button class="btn btn-ghost" id="vp-del-cancel">${t.del_cancel}</button>
      <button class="btn btn-danger" id="vp-del-confirm" disabled>${t.del_btn}</button>
    </div>
  </div>`;
  document.body.appendChild(ov);
  const inp=ov.querySelector('#vp-del-input');
  const confirm=ov.querySelector('#vp-del-confirm');
  inp.addEventListener('input',()=>{ confirm.disabled = inp.value!=='DELETE'; });
  ov.querySelector('#vp-del-cancel').addEventListener('click',()=>ov.remove());
  confirm.addEventListener('click',async()=>{
    if(inp.value!=='DELETE') return;
    ov.remove();
    await deleteProfile(entry.id);
  });
  inp.focus();
}

async function deleteProfile(id){
  if(!id) return;
  const wasActive = id===activeProfileId;
  profilesStore.profiles=profilesStore.profiles.filter(p=>p.id!==id);
  if(!wasActive){
    /* deleting a profile you're not currently viewing — just drop it from
       the list, nothing about the current screen changes */
    try{ await persistProfiles(); }catch(e){ console.warn('storage failed',e); }
    renderProfilePicker();
    return;
  }
  const next=profilesStore.profiles[0];
  if(next){
    switchProfile(next.id); /* persists the new activeId */
  }else{
    profilesStore.activeId=null; activeProfileId=null;
    try{ await persistProfiles(); }catch(e){ console.warn('storage failed',e); }
    startNewProfile();
  }
}

function switchProfile(id){
  const entry=profilesStore.profiles.find(p=>p.id===id);
  if(!entry) return;
  activeProfileId=id; profilesStore.activeId=id;
  persistProfiles().catch(()=>{});
  profile=entry.profile; profileName=entry.name; profileCountry=entry.country||'';
  if(profile && !profile._lang) profile._lang=entry.lang||lang;
  approved=true;
  currentPost=null; postInput=''; postLink=''; postImages=[]; lastRefineNote=null; postLang=null; currentHistoryId=null;
  step=QUESTIONS.length+1;
  renderProfilePicker(); renderLayers(); render();
  if(profile && profile._lang!==lang) translateProfile(lang);
}

function startNewProfile(){
  activeProfileId=null;
  profile=null; approved=false;
  Object.keys(answers).forEach(k=>delete answers[k]);
  uploads={posts:'',about:'',images:[],noLinkedIn:false};
  profileName=''; profileCountry='';
  currentPost=null; postInput=''; postLink=''; postImages=[]; lastRefineNote=null; postLang=null; currentHistoryId=null;
  step=-1;
  clearDraft(); /* deliberately starting fresh — don't resurrect an old draft later */
  renderProfilePicker(); renderLayers(); render();
}

wireUserMenu();

/* ---------- sidebar ---------- */
function renderLayers(){
  const filled = {};
  LAYERS.forEach(L=>filled[L.id]=0);
  Object.keys(answers).forEach(qid=>{
    if(!answered(qid)) return;
    (FEEDS[qid]||[]).forEach(id=>filled[id]=(filled[id]||0)+1);
  });
  const el = document.getElementById('layers-panel');
  el.innerHTML = `<h3>${lang==='he'?'שכבות הפרופיל':'Profile layers'}</h3>` +
    LAYERS.map((L,li)=>{
      const n = Math.min(filled[L.id]||0, L.slots);
      const g=['var(--g-blue)','var(--g-orange)','var(--g-pink)','var(--g-green)','var(--g-lime)'][li%5];
      let dots='';
      for(let i=0;i<L.slots;i++) dots+=`<span class="dot ${i<n?'on':''}" style="${i<n?'background:'+g:''}"></span>`;
      return `<div class="layer"><span class="name">${L[lang]}</span><span class="dots">${dots}</span></div>`;
    }).join('');
}

function answered(qid){
  const q = QUESTIONS.find(x=>x.id===qid);
  const v = answers[qid];
  if(!q) return false;
  if(q.type==='open') return v && v.trim().length>=30;
  if(q.type==='single') return !!v;
  if(q.type==='rank') return Array.isArray(v) && v.length===q.max;
  /* Q10 is calibration material; if the user has no LinkedIn it's optional
     (the free-text answers Q1/Q6/Q9 already give writing samples) */
  if(q.type==='uploads') return uploads.noLinkedIn||(uploads.posts.trim().length>50)||uploads.images.length>0;
  return false;
}

/* ---------- render ---------- */
function render(){
  const card = document.getElementById('main-card');
  /* the layers progress sidebar only makes sense while answering questions —
     it just shows stale, fully-filled dots everywhere else and eats width
     that the results/composer screens want for themselves */
  const appEl = document.querySelector('.app');
  const showAside = step>=0 && step<QUESTIONS.length;
  if(appEl) appEl.classList.toggle('no-aside', !showAside);
  if(step===-1){ card.innerHTML = introHTML(); wireIntro(); return; }
  if(step===QUESTIONS.length){ card.innerHTML = generateHTML(); return; }
  if(step===QUESTIONS.length+1){ card.innerHTML = profileHTML(); wireRefine(); return; }
  if(step===STEP_COMPOSER){ card.innerHTML = composerHTML(); wireComposer(); return; }
  if(step===STEP_RESULT){ card.innerHTML = resultHTML(); return; }
  if(step===STEP_HISTORY){ card.innerHTML = historyHTML(); wireHistory(); return; }
  card.innerHTML = questionHTML(QUESTIONS[step]);
  wireQuestion(QUESTIONS[step]);
  renderLayers();
}

function wireIntro(){
  const n=document.getElementById('intro-name');
  const c=document.getElementById('intro-country');
  const listEl=document.getElementById('country-list');
  const b=document.getElementById('start-btn');
  const loc=lang==='he'?'he':'en';
  let items;
  try{
    const dn=new Intl.DisplayNames([loc],{type:'region'});
    items=COUNTRY_CODES.map(code=>({code,label:dn.of(code)||code}));
  }catch(e){ items=COUNTRY_CODES.map(code=>({code,label:code})); }
  items.sort((a,b2)=>a.label.localeCompare(b2.label,loc));

  let activeIdx=-1, filtered=items;
  const setName=()=>{ profileName=n.value.trim(); b.disabled=!profileName; scheduleDraftSave(); };
  n.addEventListener('input',setName);

  /* show the current country's name in the field (not the code) */
  if(profileCountry){ const cur=items.find(i=>i.code===profileCountry); if(cur) c.value=cur.label; }

  function renderList(){
    if(!filtered.length){ listEl.innerHTML=`<div class="combo-empty">${T().country_none}</div>`; }
    else listEl.innerHTML=filtered.map((i,idx)=>`<div class="combo-opt${idx===activeIdx?' active':''}" role="option" data-code="${i.code}">${i.label}</div>`).join('');
  }
  function open(){ listEl.hidden=false; c.setAttribute('aria-expanded','true'); renderList(); }
  function close(){ listEl.hidden=true; c.setAttribute('aria-expanded','false'); activeIdx=-1; }
  function filter(){
    const q=c.value.trim().toLowerCase();
    filtered=q?items.filter(i=>i.label.toLowerCase().includes(q)):items;
    activeIdx=-1; open();
  }
  function pick(code){
    const it=items.find(i=>i.code===code); if(!it) return;
    profileCountry=code; c.value=it.label; close(); scheduleDraftSave();
  }

  c.addEventListener('focus',()=>{ filtered=items; open(); });
  c.addEventListener('input',()=>{ profileCountry=''; filter(); });
  c.addEventListener('keydown',e=>{
    if(listEl.hidden && (e.key==='ArrowDown'||e.key==='ArrowUp')){ filter(); return; }
    if(e.key==='ArrowDown'){ e.preventDefault(); activeIdx=Math.min(activeIdx+1,filtered.length-1); renderList(); scrollActive(); }
    else if(e.key==='ArrowUp'){ e.preventDefault(); activeIdx=Math.max(activeIdx-1,0); renderList(); scrollActive(); }
    else if(e.key==='Enter'){ if(activeIdx>-1&&filtered[activeIdx]){ e.preventDefault(); pick(filtered[activeIdx].code); } }
    else if(e.key==='Escape'){ close(); }
  });
  function scrollActive(){ const el=listEl.querySelector('.combo-opt.active'); if(el) el.scrollIntoView({block:'nearest'}); }
  listEl.addEventListener('mousedown',e=>{ const o=e.target.closest('.combo-opt'); if(o){ e.preventDefault(); pick(o.dataset.code); } });
  document.addEventListener('mousedown',e=>{ if(!e.target.closest('.combo')) close(); });

  setName();
}

function questionHTML(q){

  }
  if(q.type==='rank'){
    const sel = answers[q.id]||[];
    const label=v=>{const o=q.opts.find(x=>x.v===v);return o?o[lang]:v;};
    const slots=[];
    for(let i=0;i<q.max;i++){

            :`<span class="slot-empty">${t.rank_drop}</span>`}

    }
    const pool=q.opts.filter(o=>!sel.includes(o.v))
      .map(o=>`<span class="rank-chip" data-v="${o.v}">${o[lang]}</span>`).join('');
    const poolDone = sel.length>=q.max;
    body = `<div class="char-note" style="margin-bottom:14px">${t.rank_note}</div>
      <div class="rank-wrap">
        <div><div class="rank-cap">${t.rank_slots_cap}</div><div class="rank-slots" id="rank-slots">${slots.join('')}</div></div>
        <div><div class="rank-cap">${t.rank_pool_cap}</div><div class="rank-pool ${poolDone?'pool-done':''}" id="rank-pool">${pool||`<span class="slot-empty">—</span>`}</div></div>
      </div>`;
  }
  if(q.type==='uploads'){
