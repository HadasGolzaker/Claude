function wireComposer(){
  const t=T();
  const ta=document.getElementById('post-input');
  ta.addEventListener('input',()=>{postInput=ta.value;
    const b=document.getElementById('gen-btn'); if(b) b.disabled=postInput.trim().length<20;});
  const ib=document.getElementById('ideas-btn');
  if(ib) ib.addEventListener('click',showIdeasSetup);
  const lk=document.getElementById('post-link');
  lk.addEventListener('input',()=>postLink=lk.value);
  document.getElementById('post-img').addEventListener('change',async e=>{
    for(const f of Array.from(e.target.files).slice(0,3-postImages.length)){
      const data=await new Promise((res,rej)=>{const r=new FileReader();
        r.onload=()=>res(r.result.split(',')[1]);r.onerror=()=>rej(new Error('read failed'));r.readAsDataURL(f);});
      postImages.push({media_type:f.type,data});
    }
    render();
  });
  const rb=document.getElementById('rec-btn');
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){rb.disabled=true;rb.textContent=t.rec_unsupported;return;}
  rb.addEventListener('click',()=>{
    if(recog){recog.stop();return;}
    recog=new SR();
    recog.lang = lang==='he'?'he-IL':'en-US';
    recog.continuous=true; recog.interimResults=false;
    recog.onresult=e=>{
      for(const r of e.results){ if(r.isFinal){ postInput+=(postInput?' ':'')+r[0].transcript; } }
      ta.value=postInput;
      const b=document.getElementById('gen-btn'); if(b) b.disabled=postInput.trim().length<20;
    };
    recog.onerror=e=>{
      recog=null;
      const msg = lang==='he'
        ? (e.error==='not-allowed' ? 'הדפדפן חסם גישה למיקרופון. בדקו את אייקון המנעול ליד הכתובת ואשרו מיקרופון.'
           : 'ההקלטה נכשלה ('+e.error+'). כשהקובץ רץ מקומית או בתוך תצוגה מוטמעת, כרום חוסם את שירות הזיהוי - ראו הסבר בצ׳אט.')
        : (e.error==='not-allowed' ? 'The browser blocked microphone access. Check the lock icon near the address bar.'
           : 'Recording failed ('+e.error+').');
      const box=document.querySelector('.step');
      if(box && !document.getElementById('rec-err')) box.insertAdjacentHTML('beforeend','<div class="gap-note" id="rec-err">'+msg+'</div>');
      const b3=document.getElementById('rec-btn'); if(b3)b3.textContent=T().rec_start;
    };
    recog.onend=()=>{recog=null;const b2=document.getElementById('rec-btn');if(b2)b2.textContent=T().rec_start;};
    try{ recog.start(); rb.textContent=t.rec_stop; }
    catch(ex){ recog=null; rb.textContent=t.rec_start; }
  });
}

/* ---------- topic brainstormer ---------- */
function ideasGenDisabled(){
  if(!Object.values(ideasCats).some(Boolean)) return true;
  if(ideasMode==='topic' && !ideasTopic.trim()) return true;
  return false;
}

function ideasSetupHTML(){
  const t=T();
  const cats=t.ideas_cats;
  const catRow=Object.keys(cats).map(k=>`
    <label class="cat-check"><input type="checkbox" data-cat="${k}" ${ideasCats[k]?'checked':''}> ${cats[k]}</label>`).join('');
  return `<div class="ideas-setup">
    <div class="section-h">${t.ideas_setup_h}</div>
    <button type="button" class="opt ${ideasMode==='profile'?'selected':''}" data-mode="profile">${t.ideas_mode_profile}</button>
    <button type="button" class="opt ${ideasMode==='topic'?'selected':''}" data-mode="topic">${t.ideas_mode_topic}</button>
    <div id="ideas-topic-wrap" style="${ideasMode==='topic'?'':'display:none'}">
      <input type="text" id="ideas-topic-input" style="min-height:auto" placeholder="${t.ideas_topic_ph}" value="${escapeHtml(ideasTopic)}">
    </div>
    <label class="field-label" style="margin-top:12px">${t.ideas_cats_h}</label>
    <div class="cat-checks">${catRow}</div>
    <button class="btn btn-primary" id="ideas-generate-btn" ${ideasGenDisabled()?'disabled':''}>${t.ideas_generate_btn}</button>
  </div>`;
}

function showIdeasSetup(){
  const box=document.getElementById('ideas-box');
  if(!box) return;
  box.innerHTML=ideasSetupHTML();
  wireIdeasSetup();
}

function wireIdeasSetup(){
  const box=document.getElementById('ideas-box');
  if(!box) return;
  box.querySelectorAll('.ideas-setup .opt[data-mode]').forEach(b=>b.addEventListener('click',()=>{
    ideasMode=b.dataset.mode;
    box.innerHTML=ideasSetupHTML();
    wireIdeasSetup();
  }));
  const ti=document.getElementById('ideas-topic-input');
  if(ti) ti.addEventListener('input',()=>{
    ideasTopic=ti.value;
    const btn=document.getElementById('ideas-generate-btn'); if(btn) btn.disabled=ideasGenDisabled();
  });
  box.querySelectorAll('.cat-check input[type=checkbox]').forEach(cb=>cb.addEventListener('change',()=>{
    ideasCats[cb.dataset.cat]=cb.checked;
    const btn=document.getElementById('ideas-generate-btn'); if(btn) btn.disabled=ideasGenDisabled();
  }));
  const gb=document.getElementById('ideas-generate-btn');
  if(gb) gb.addEventListener('click',brainstormTopics);
}

async function brainstormTopics(){
  const t=T();
  const box=document.getElementById('ideas-box');
  if(!box) return;
  const selectedCats=Object.keys(ideasCats).filter(k=>ideasCats[k]);
  if(!selectedCats.length) return;
  let i=0;
  box.innerHTML=`<div class="loading" style="padding:24px 0"><div class="pulse" style="width:40px;height:40px;border-width:3px"></div><p id="ideas-msg">${t.ideas_loading[0]}</p></div>`;
  const timer=setInterval(()=>{i=(i+1)%t.ideas_loading.length;const el=document.getElementById('ideas-msg');if(el)el.textContent=t.ideas_loading[i];},2000);

  const langName=lang==='he'?'Hebrew':'English';
  const catList=selectedCats.map(k=>`"${k}"`).join(', ');
  const catDefs=`- "news": an ongoing trend, debate, or recurring theme they could weigh in on (from your knowledge — no need for a specific dated event).
- "professional": an insight, lesson, or take from their professional world.
- "personal": a value, belief, or general reflection touching personal life — do NOT invent a specific personal anecdote, past client, or story about them; keep it general. They'll get a chance to add their own real personal detail after picking an idea.
- "hobby": tied to interests or hobbies visible in their profile.`;

  const text = ideasMode==='topic'
    ? `You help this person brainstorm LinkedIn post ideas about a SPECIFIC topic they gave you, tailored to their voice and worldview. Their full profile (personality, motives, writing DNA, localization, storytelling):
${JSON.stringify({...profile, photo:undefined})}

The topic to brainstorm about: "${ideasTopic.trim()}"

Suggest 8 concrete post ideas — each a DIFFERENT angle on this exact topic — using ONLY these categories of angle: ${catList}.
${catDefs}
Write each idea in ${langName}, matching their voice and audience (localization). "title" = a short scroll-stopping idea; "angle" = one line on what the post would actually say. Every idea must clearly be about "${ideasTopic.trim()}" — do not drift to unrelated topics.

Respond with ONLY valid JSON, no fences: {"ideas":[{"category":"...","title":"...","angle":"..."}]}`
    : `You help this person decide WHAT to post on LinkedIn when they have nothing specific in mind. Their full profile (personality, motives, writing DNA, localization, storytelling):
${JSON.stringify({...profile, photo:undefined})}

Suggest 8 concrete post ideas tailored to THIS person — drawn from your own knowledge of their field and of evergreen conversations in it, NOT from any live search. Use ONLY these categories: ${catList}.
${catDefs}
Write each idea in ${langName}, matching their voice and audience (localization). "title" = a short scroll-stopping idea; "angle" = one line on what the post would actually say. Make them specific to this person, not generic.

Respond with ONLY valid JSON, no fences: {"ideas":[{"category":"...","title":"...","angle":"..."}]}`;

  try{
    const res=await callClaude([{type:'text',text}]);
    clearInterval(timer);
    renderIdeas(res.ideas||[]);
  }catch(err){
    clearInterval(timer);
    box.innerHTML=`<div class="gap-note">${t.ideas_err}<br><small style="opacity:.6">${escapeHtml((err&&err.message)||'')}</small></div>`;
  }
}

function renderIdeas(ideas){
  const t=T();
  const box=document.getElementById('ideas-box');
  if(!box) return;
  if(!ideas.length){ box.innerHTML=`<div class="gap-note">${t.ideas_err}</div>`; return; }
  const cats=t.ideas_cats;
  const catGrad={news:'var(--g-blue)',professional:'var(--g-orange)',personal:'var(--g-pink)',hobby:'var(--g-green)'};
  const pills=ideas.map((idea,idx)=>{
    const cat=cats[idea.category]||'';
    const pg=catGrad[idea.category]||'var(--g-lime)';
    return `<div class="idea-pill" style="--pg:${pg};animation-delay:${idx*70}ms">
      <button class="idea-head" data-open="${idx}">
        <span class="idea-cat">${cat}</span>
        <span class="idea-title">${escapeHtml(idea.title||'')}</span>
      </button>
      <div class="idea-body">
        <div class="idea-angle">${escapeHtml(idea.angle||'')}</div>
        <div class="idea-personal">
          <label class="field-label">${t.ideas_personal_label}</label>
          <textarea class="idea-personal-input" data-idx="${idx}" style="min-height:60px" placeholder="${t.ideas_personal_ph}"></textarea>
          <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:8px">
            <button class="btn btn-ghost idea-use-plain" data-use="${idx}">${t.ideas_use_plain}</button>
            <button class="btn btn-primary idea-use-personal" data-use="${idx}">${t.ideas_use_personal}</button>
          </div>
        </div>
      </div>
    </div>`;
  }).join('');
  box.innerHTML=`<div class="section-h">${t.ideas_h}</div><div class="idea-pills">${pills}</div>`;
  box.querySelectorAll('.idea-head').forEach(b=>b.addEventListener('click',()=>{
    const pill=b.closest('.idea-pill');
    const wasOpen=pill.classList.contains('open');
    box.querySelectorAll('.idea-pill.open').forEach(p=>p.classList.remove('open'));
    if(!wasOpen){ pill.classList.add('open'); pill.scrollIntoView({block:'nearest',behavior:'smooth'}); }
  }));
  box.querySelectorAll('.idea-use-plain').forEach(b=>b.addEventListener('click',()=>useIdea(ideas[+b.dataset.use])));
  box.querySelectorAll('.idea-use-personal').forEach(b=>b.addEventListener('click',async ()=>{
    const idx=+b.dataset.use;
    const ta=box.querySelector(`.idea-personal-input[data-idx="${idx}"]`);
    const note=(ta&&ta.value||'').trim();
    if(!note){ useIdea(ideas[idx]); return; }
    const orig=b.textContent; b.disabled=true; b.textContent=t.ideas_personalizing;
    try{
      const merged=await personalizeIdea(ideas[idx],note);
      useIdea(merged);
    }catch(e){
      console.warn('personalize failed, using idea as-is',e);
      useIdea(ideas[idx]);
    }finally{
      b.disabled=false; b.textContent=orig;
    }
  }));
}

async function personalizeIdea(idea,note){
  const langName=lang==='he'?'Hebrew':'English';
  const text=`Blend a real personal detail into a LinkedIn post idea, in this person's voice. Writing DNA + storytelling (for voice only):
${JSON.stringify({writing_dna:profile.writing_dna,storytelling:profile.storytelling})}

Original idea:
Title: ${idea.title||''}
Angle: ${idea.angle||''}

Personal detail to weave in (real, from the user — use it as given, don't invent anything beyond it): "${note}"

Rewrite as one short idea seed in ${langName} that opens the post from this real personal detail and connects it to the original angle. Respond with ONLY valid JSON, no fences: {"title":"...","angle":"..."}`;
  const merged=await callClaude([{type:'text',text}]);
  /* a call can technically return valid JSON that doesn't match the
     requested {title,angle} shape (wrong keys, empty strings) — treat
     that the same as a network failure so the caller falls back to the
     original idea instead of silently handing useIdea an empty seed */
  if(!merged || !((merged.title||'').trim() || (merged.angle||'').trim())) throw new Error('personalize response missing title/angle');
  return merged;
}

function useIdea(idea){
  const seed=((idea.title||'')+(idea.angle?' — '+idea.angle:'')).trim();
  /* a malformed idea (no title/angle) would otherwise silently blank the
     textarea and leave the "generate post" button disabled with no clue
     why — bail out instead of applying an empty seed */
  if(!seed) return;
  postInput=seed;
  const ta=document.getElementById('post-input');
  if(ta){ ta.value=seed; ta.focus(); }
  const g=document.getElementById('gen-btn'); if(g) g.disabled=postInput.trim().length<20;
  const box=document.getElementById('ideas-box'); if(box) box.innerHTML='';
  window.scrollTo({top:0,behavior:'smooth'});
}

function buildPostContent(refineNote){
  const targetLang = effectivePostLang()==='he' ? 'Hebrew' : 'English';
  let text=`You are ghostwriting ONE LinkedIn post AS this person. Their full profile (personality + writing DNA):
${JSON.stringify({...profile, photo:undefined})}

RULES:
- LANGUAGE (most important): write the ENTIRE post in ${targetLang}, natively — real slang, idiom and rhythm a native ${targetLang} speaker actually uses, not a stiff or literal-feeling translation. This is fixed regardless of what language the raw material below happens to be written in: if the raw material is in a different language, translate the MEANING and the STORY into fully natural ${targetLang}, never word-for-word.
- Follow every DO and DON'T in writing_dna literally. Mimic their sentence length, punctuation habits, emoji habits, humor and endings. Reuse their signature phrasing style without quoting old posts.
- First line = a scroll-stopping hook drawn from the most specific, human detail in the material. No clickbait clichés.
- Short paragraphs with breathing room. One idea per post. Specificity beats generality.
- Match content angle to their profile: systemizer → process/insight framing; empathizer → people/story framing; their top motives shape what the post celebrates.
- LOCALIZATION: honor the "localization" fields — keep their language_mix, cultural_markers, formality and audience fit so the post reads natively to them and their market. Never translate their voice into neutral corporate English.
- STORYTELLING: build the post using their "storytelling.structure" and lean on ONE of their "storytelling.templates" where it fits; use their signature_moves naturally (don't force all of them).
- Sound human. Forbidden: corporate buzzwords, "thrilled/excited to share", "game-changer", generic AI cadence. NEVER use an em dash (—), under any circumstance, even if their writing DNA shows one. Use a comma, period, or a new sentence instead.
- If writing in Hebrew: every sentence must be complete, grammatically correct, natural spoken Hebrew, not a literal-feeling translation or a broken fragment.
- End the way THEY end posts (per writing_dna.endings).

RAW MATERIAL (what happened, in their own words):
${postInput}`;
  if(postLink.trim()) text+=`\n\nRELEVANT LINK — read it and weave 1-2 concrete points naturally, no summary dump: ${postLink.trim()}`;
  if(postImages.length) text+=`\n\nThe attached image(s) will be posted with this text. Reference what's in them naturally if it strengthens the post.`;
  if(refineNote&&currentPost) text+=`\n\nPREVIOUS DRAFT:\n${currentPost.post}\n\nUSER FEEDBACK — apply it exactly: ${refineNote}`;
  text+=`\n\nRespond with ONLY valid JSON, no fences: {"post":"the full post with \\n\\n between paragraphs","hooks":["alternative opening line 1","alternative opening line 2"]}`;
  const content=[{type:'text',text}];
  postImages.forEach(im=>content.push({type:'image',source:{type:'base64',media_type:im.media_type,data:im.data}}));
  return content;
}

async function startPostGen(refineNote){
  lastRefineNote=refineNote||null;
  const t=T();
  const card=document.getElementById('main-card');
  let i=0;
  card.innerHTML=`<div class="step active loading"><div class="pulse"></div><p id="loading-msg">${t.writing[0]}</p></div>`;
  clearInterval(loadTimer);
  loadTimer=setInterval(()=>{i=(i+1)%t.writing.length;const el=document.getElementById('loading-msg');if(el)el.textContent=t.writing[i];},2200);
  try{
    currentPost=await callClaude(buildPostContent(refineNote), !!postLink.trim(), 12000);
    clearInterval(loadTimer);
    savePostHistory();
    step=STEP_RESULT; render();
  }catch(err){
    clearInterval(loadTimer);
    console.error('post gen error:',err);
    card.innerHTML=`<div class="step active">
      <div class="error-box">${t.err_api}<br><small style="opacity:.7">${escapeHtml((err&&err.message)||'')}</small></div>
      ${String(err&&err.message).includes('fetch')?`<div class="gap-note" style="margin-top:12px"><input type="text" id="api-key-input" style="min-height:auto" placeholder="sk-ant-..." value="${escapeHtml(apiKey)}"></div>`:''}
      <div class="nav">
        <button class="btn btn-ghost" onclick="step=STEP_COMPOSER;render()">${t.back}</button>
        <button class="btn btn-primary" onclick="const k=document.getElementById('api-key-input');if(k)apiKey=k.value.trim();startPostGen(lastRefineNote)">${t.retry}</button>
      </div></div>`;
  }
}

function resultHTML(){
  const t=T(), p=currentPost||{post:'',hooks:[]};
  const hooks=(p.hooks||[]).map(h=>`<span class="chip">${escapeHtml(h)}</span>`).join('');
  return `<div class="step active">
    <div class="eyebrow">${t.result_h}</div>
    ${postLangToggleHTML()}
    <div style="background:var(--paper);border:1.5px solid var(--line);border-radius:10px;padding:22px;white-space:pre-wrap;font-size:1.02rem">${escapeHtml(p.post)}</div>
    <div style="margin-top:12px;display:flex;gap:8px;flex-wrap:wrap">
      <button class="btn btn-accent" id="copy-btn" onclick="copyPost()">${t.copy}</button>
      <button class="btn btn-primary" id="li-open-btn" onclick="openLinkedIn()">${t.li_open}</button>
    </div>
    ${hooks?`<div class="section-h">${t.alt_hooks}</div>${hooks}`:''}
    <div class="section-h">${t.refine_post_label}</div>
    <textarea id="post-refine" style="min-height:80px" placeholder="${t.refine_post_ph}"></textarea>
    <div class="nav">
      <button class="btn btn-ghost" onclick="postInput='';postLink='';postImages=[];currentPost=null;currentHistoryId=null;step=STEP_COMPOSER;render()">${t.new_post}</button>
      <button class="btn btn-primary" onclick="const n=document.getElementById('post-refine').value.trim();if(n)startPostGen(n)">${t.regen}</button>
    </div>
  </div>`;
}

function copyPost(){
  if(!currentPost) return;
  navigator.clipboard.writeText(currentPost.post).then(()=>{
    const b=document.getElementById('copy-btn');
    if(b){b.textContent=T().copied; setTimeout(()=>{if(b)b.textContent=T().copy;},2000);}
  });
}

/* copy the post, then open LinkedIn's composer in a new tab to paste */
function openLinkedIn(){
  if(!currentPost) return;
  const finish=()=>{
    const b=document.getElementById('li-open-btn');
    if(b){b.textContent=T().li_toast; setTimeout(()=>{if(b)b.textContent=T().li_open;},2500);}
    window.open('https://www.linkedin.com/feed/?shareActive=true','_blank','noopener');
  };
  navigator.clipboard.writeText(currentPost.post).then(finish, finish);
}

async function savePostHistory(){
  try{
    if(!window.storage) return;
    let hist=[];
    try{
      const saved=await window.storage.get('voiceprint_posts');
      if(saved&&saved.value) hist=JSON.parse(saved.value);
    }catch(e){/* first post */}
    /* refining or toggling language on the same post updates its existing
       entry in place, instead of piling up a near-duplicate row per edit */
    const existingIdx = currentHistoryId ? hist.findIndex(h=>h.id===currentHistoryId) : -1;
    if(existingIdx>=0){
      hist[existingIdx] = {...hist[existingIdx], input:postInput.slice(0,300), post:currentPost.post};
    }else{
      currentHistoryId = genId();
      hist.push({id:currentHistoryId, date:new Date().toISOString(), input:postInput.slice(0,300), post:currentPost.post});
    }
    if(hist.length>20) hist=hist.slice(-20);
    await window.storage.set('voiceprint_posts', JSON.stringify(hist));
  }catch(e){console.warn('post history save failed',e);}
}

/* ---------- post history screen (from the user menu) ---------- */
function firstLine(text){
  if(!text) return '';
  return (text.split('\n').map(s=>s.trim()).find(Boolean))||'';
}

async function loadHistoryEntries(){
  if(!window.storage) return [];
  try{
    const saved=await window.storage.get('voiceprint_posts');
    if(saved&&saved.value) return JSON.parse(saved.value);
  }catch(e){ console.warn('history load failed',e); }
  return [];
}

function historyHTML(){
  const t=T();
  return `<div class="step active">
    <div class="eyebrow">Voiceprint</div>
    <h2 class="q-title">${t.menu_history}</h2>
    <div id="history-list"><div class="loading" style="padding:24px 0"><div class="pulse" style="width:40px;height:40px;border-width:3px"></div></div></div>
    <div class="nav">
      <button class="btn btn-ghost" onclick="step=(preMenuStep??(QUESTIONS.length+1));preMenuStep=null;render()">${t.back}</button>
    </div>
  </div>`;
}

async function wireHistory(){
  const entries=await loadHistoryEntries();
  const box=document.getElementById('history-list');
  if(!box) return; /* user already navigated away before this resolved */
  const t=T();
  if(!entries.length){ box.innerHTML=`<div class="gap-note">${t.history_empty}</div>`; return; }
  const sorted=entries.slice().reverse(); /* newest first */
  const catGrad=['var(--g-blue)','var(--g-orange)','var(--g-pink)','var(--g-green)'];
  box.innerHTML=`<div class="idea-pills">`+sorted.map((entry,idx)=>{
    const d=new Date(entry.date);
    const dateStr=isNaN(d)?'':d.toLocaleDateString(lang==='he'?'he-IL':'en-US',{year:'numeric',month:'short',day:'numeric'});
    const title=firstLine(entry.post)||firstLine(entry.input)||t.history_untitled;
    return `<div class="idea-pill" style="--pg:${catGrad[idx%catGrad.length]};animation-delay:${idx*50}ms">
      <button class="idea-head" data-open="${idx}">
        <span class="idea-cat">${escapeHtml(dateStr)}</span>
        <span class="idea-title">${escapeHtml(title)}</span>
      </button>
      <div class="idea-body">
        <div class="idea-angle" style="white-space:pre-wrap">${escapeHtml(entry.post||'')}</div>
        <button class="btn btn-ghost history-copy" data-idx="${idx}">${t.copy}</button>
      </div>
    </div>`;
  }).join('')+`</div>`;
  box.querySelectorAll('.idea-head').forEach(b=>b.addEventListener('click',()=>{
    const pill=b.closest('.idea-pill');
    const wasOpen=pill.classList.contains('open');
    box.querySelectorAll('.idea-pill.open').forEach(p=>p.classList.remove('open'));
    if(!wasOpen){ pill.classList.add('open'); pill.scrollIntoView({block:'nearest',behavior:'smooth'}); }
  }));
  box.querySelectorAll('.history-copy').forEach(b=>b.addEventListener('click',()=>{
    const entry=sorted[+b.dataset.idx];
    navigator.clipboard.writeText(entry.post||'').then(()=>{
      const orig=b.textContent; b.textContent=T().copied;
      setTimeout(()=>{ b.textContent=orig; },2000);
    });
  }));
}

/* ---------- boot: load saved profile if exists ---------- */
(async function boot(){
  await window.__authReady;
  renderLayers();
  try{
    if(window.storage){
      const saved=await window.storage.get('voiceprint_profiles');
      if(saved&&saved.value){
        profilesStore=JSON.parse(saved.value);
        if(!Array.isArray(profilesStore.profiles)) profilesStore={activeId:null,profiles:[]};
      }else{
        /* migrate the old single-profile format into the profiles list */
        const old=await window.storage.get('voiceprint_profile');
        if(old&&old.value){
          const obj=JSON.parse(old.value);
          if(obj.profile){
            const entry={id:genId(),name:(obj.lang==='en'?'Profile 1':'פרופיל 1'),country:'',
              lang:obj.lang||'he',profile:obj.profile,savedAt:obj.savedAt||new Date().toISOString()};
            profilesStore={activeId:entry.id,profiles:[entry]};
            await persistProfiles();
          }
        }
      }
      const entry=profilesStore.profiles.find(p=>p.id===profilesStore.activeId)||profilesStore.profiles[0];
      if(entry){
        activeProfileId=entry.id; profilesStore.activeId=entry.id;
        profile=entry.profile; profileName=entry.name; profileCountry=entry.country||'';
        lang=entry.lang||'he';
        if(profile && !profile._lang) profile._lang=lang;
        approved=true; step=QUESTIONS.length+1;
        setLang(lang);
        return;
      }
    }
  }catch(e){/* no saved profile — fresh start */}
  /* no saved profile yet — resume an in-progress questionnaire draft, if any,
     so answers already typed survive closing the tab or logging out */
  try{
    if(window.storage){
      const d=await window.storage.get('voiceprint_draft');
      if(d&&d.value){
        const draft=JSON.parse(d.value);
        Object.assign(answers, draft.answers||{});
        uploads.posts=(draft.uploads&&draft.uploads.posts)||'';
        uploads.about=(draft.uploads&&draft.uploads.about)||'';
        uploads.noLinkedIn=!!(draft.uploads&&draft.uploads.noLinkedIn);
        profileName=draft.profileName||'';
        profileCountry=draft.profileCountry||'';
        if(typeof draft.step==='number' && draft.step>=-1 && draft.step<QUESTIONS.length) step=draft.step;
      }
    }
  }catch(e){/* no draft — fresh start */}
  render();
})();
</script>

<script type="module">
/* =========================================================
   AUTH + STORAGE — Supabase (email magic-link login,
   per-user profile + post history). Infrastructure only.
   ========================================================= */
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

/* ---- login screen styles (kept minimal, matches the app look) ---- */
const css = document.createElement('style');
css.textContent = `
#vp-auth{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;padding:24px;z-index:1000}
#vp-auth .box{max-width:420px;width:100%;background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:34px 32px;text-align:center;box-shadow:var(--shadow)}
#vp-auth h2{font-family:var(--font-serif);font-weight:600;letter-spacing:normal;font-size:2rem;margin-bottom:8px}
#vp-auth p{color:var(--ink-soft);margin-bottom:20px;font-size:1rem}
#vp-auth input{width:100%;font:inherit;border:1.5px solid var(--line);border-radius:12px;padding:13px 15px;background:var(--paper);color:var(--ink);margin-bottom:12px;min-height:auto}
#vp-auth input:focus{outline:2px solid var(--accent);outline-offset:1px;border-color:var(--accent)}
#vp-send{width:100%;border:0;font:inherit;font-weight:600;border-radius:999px;padding:13px;cursor:pointer;background:var(--ink);color:var(--bg)}
#vp-send:disabled{opacity:.5;cursor:not-allowed}
#vp-auth .msg{margin-top:14px;font-size:.9rem;color:var(--ink);font-weight:600}
#vp-auth .msg.err{color:var(--danger)}
#vp-auth-controls{position:fixed;top:24px;right:24px;display:flex;align-items:center;gap:12px;direction:ltr;z-index:1001}
#vp-logout{border:1.5px solid var(--line);background:transparent;color:var(--ink-soft);font:inherit;font-weight:600;font-size:.82rem;border-radius:999px;padding:6px 14px;cursor:pointer;margin-inline-start:10px}
`;
document.head.appendChild(css);

const AUTH_I18N = {
  he:{ title:'Voiceprint', sub:'הכניסו את המייל שלכם ונשלח לכם קישור כניסה.', ph:'you@example.com',
    btn:'שליחת קישור כניסה', sent:'שלחנו קישור למייל. פתחו אותו כדי להיכנס.',
    err:'משהו השתבש. נסו שוב.', bad:'כתובת מייל לא תקינה.',
    noconf:'החיבור לשרת עדיין לא הוגדר. ראו את קובץ ההוראות (README).', logout:'יציאה' },
  en:{ title:'Voiceprint', sub:'Enter your email and we\'ll send you a login link.', ph:'you@example.com',
    btn:'Send login link', sent:'We\'ve sent a link to your email. Open it to log in.',
    err:'Something went wrong. Please try again.', bad:'Invalid email address.',
    noconf:'The server connection isn\'t set up yet. See the instructions file (README).', logout:'Log out' }
};
let authLang = (typeof lang !== 'undefined' && (lang==='he'||lang==='en')) ? lang : 'he';
const AT = () => AUTH_I18N[authLang];

const overlay = document.createElement('div');
overlay.id = 'vp-auth';
overlay.innerHTML = `
  <div id="vp-auth-controls">
    <button class="theme-toggle" id="vp-theme-btn" type="button" aria-label="light/dark">
      <svg class="moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg>
      <svg class="sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
    </button>
    <div class="lang-toggle" id="vp-lang-toggle">
      <button type="button" data-l="he" class="${authLang==='he'?'active':''}">עברית</button>
      <button type="button" data-l="en" class="${authLang==='en'?'active':''}">English</button>
    </div>
  </div>
  <div class="box">
    <h2 class="serif" id="vp-title">${AT().title}</h2>
    <p id="vp-sub">${AT().sub}</p>
    <input id="vp-email" type="email" dir="ltr" placeholder="${AT().ph}" autocomplete="email">
    <button id="vp-send">${AT().btn}</button>
    <div class="msg" id="vp-msg" style="display:none"></div>
  </div>`;
document.body.appendChild(overlay);

function refreshAuthText(){
  document.getElementById('vp-sub').textContent = AT().sub;
  document.getElementById('vp-email').placeholder = AT().ph;
  document.getElementById('vp-send').textContent = AT().btn;
  document.querySelectorAll('#vp-lang-toggle button').forEach(b=>b.classList.toggle('active', b.dataset.l===authLang));
  if (lastMsgKey) showMsg(lastMsgKey, lastMsgErr);
}

document.getElementById('vp-lang-toggle').addEventListener('click', (e) => {
  const b = e.target.closest('button[data-l]');
  if (!b) return;
  authLang = b.dataset.l;
  refreshAuthText();
  if (typeof setLang === 'function') setLang(authLang);
  else { document.documentElement.lang = authLang; document.documentElement.dir = authLang==='he' ? 'rtl' : 'ltr'; }
});
document.getElementById('vp-theme-btn').addEventListener('click', () => {
  if (typeof toggleTheme === 'function') toggleTheme();
});

let lastMsgKey = null, lastMsgErr = false, lastMsgDetail = '';
function showMsg(key, isErr, detail){
  lastMsgKey = key; lastMsgErr = isErr; lastMsgDetail = detail||'';
  const m = document.getElementById('vp-msg');
  m.textContent = AT()[key];
  if(lastMsgDetail){
    const s=document.createElement('small');
    s.style.cssText='display:block;margin-top:6px;opacity:.7;font-weight:400';
    s.textContent=lastMsgDetail;
    m.appendChild(s);
  }
  m.style.display='block';
  m.className = 'msg' + (isErr ? ' err' : '');
}

/* ---- connect to Supabase using public config from the server ---- */
let supabase = null;
try {
  const cfg = await (await fetch('/api/config')).json();
  if (!cfg.supabaseUrl || !cfg.supabaseAnonKey) throw new Error('missing config');
  supabase = createClient(cfg.supabaseUrl, cfg.supabaseAnonKey);
} catch (e) {
  showMsg('noconf', true);
}

/* ---- storage backed by Supabase — same interface the app expects ---- */
window.storage = {
  async get(key){
    const { data, error } = await supabase.from('kv_store').select('value').eq('key', key).maybeSingle();
    if (error) throw error;
    return data ? { value: data.value } : null;
  },
  async set(key, value){
    const { data:{ user } } = await supabase.auth.getUser();
    const { error } = await supabase.from('kv_store').upsert({ user_id: user.id, key, value }, { onConflict: 'user_id,key' });
    if (error) throw error;
  }
};
window.__getToken = async () => {
  if (!supabase) return '';
  const { data:{ session } } = await supabase.auth.getSession();
  return session ? session.access_token : '';
};

const sendBtn = document.getElementById('vp-send');
const emailInput = document.getElementById('vp-email');
sendBtn.addEventListener('click', async () => {
  const email = (emailInput.value||'').trim();
  if (!email || !email.includes('@')) { showMsg('bad', true); return; }
  if (!supabase) { showMsg('noconf', true); return; }
  sendBtn.disabled = true;
  try {
    const { error } = await supabase.auth.signInWithOtp({ email, options:{ emailRedirectTo: window.location.origin } });
    if (error) throw error;
    showMsg('sent', false);
  } catch(e){ showMsg('err', true, (e&&e.message)||String(e)); sendBtn.disabled = false; }
});
emailInput.addEventListener('keydown', e => { if (e.key === 'Enter') sendBtn.click(); });

let done = false;
function onAuthed(){
  if (done) return; done = true;
  overlay.remove();
  const controls = document.querySelector('.header-controls');
  if (controls && !document.getElementById('vp-logout')) {
    const btn = document.createElement('button');
    btn.id = 'vp-logout'; btn.textContent = AT().logout;
    btn.addEventListener('click', async () => { await supabase.auth.signOut(); location.reload(); });
    controls.appendChild(btn);
  }
  window.__resolveAuth();
}

if (supabase) {
  const { data:{ session } } = await supabase.auth.getSession();
  if (session) onAuthed();
  supabase.auth.onAuthStateChange((_e, s) => { if (s) onAuthed(); });
}
</script>
</body>
